<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gedichtvergleich – Domin &amp; Can | Klasse 9</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASIS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg:        #f5f7fa;
–white:     #ffffff;
–dunkel:    #1c1c2e;
–grau:      #4a4a6a;
–grau-hell: #e8eaf0;
–rot:       #c0392b;
–rot-hell:  #fdecea;
–gruen:     #1e7e4a;
–gruen-hell:#e6f4ec;
–blau:      #1a5ea8;
–blau-hell: #e8f0fb;
–gold:      #b8860b;
–gold-hell: #fef9e7;
–border:    #d0d4de;
–shadow:    0 2px 12px rgba(28,28,46,.10);
–radius:    12px;
}

body {
font-family: ‘Open Sans’, sans-serif;
font-size: 17px;
background: var(–bg);
color: var(–dunkel);
min-height: 100vh;
padding-bottom: 40px;
}

/* ── HEADER ── */
header {
background: var(–dunkel);
color: #fff;
padding: 22px 20px 18px;
text-align: center;
}
header h1 {
font-family: ‘Merriweather’, serif;
font-size: 20px;
font-weight: 700;
margin-bottom: 4px;
}
header .meta {
font-size: 13px;
color: #a0aabf;
letter-spacing: 1px;
}

/* ── FORTSCHRITT ── */
#fortschritt-wrap {
background: var(–dunkel);
padding: 0 20px 14px;
}
#fortschritt-bar {
background: rgba(255,255,255,.18);
border-radius: 99px;
height: 7px;
overflow: hidden;
}
#fortschritt-fill {
height: 100%;
background: #4ade80;
border-radius: 99px;
transition: width .4s ease;
width: 0%;
}
#fortschritt-text {
color: #a0aabf;
font-size: 12px;
text-align: right;
margin-top: 5px;
}

/* ── STEP-TITEL ── */
#step-kopf {
background: var(–white);
border-bottom: 2px solid var(–border);
padding: 14px 20px;
display: flex;
align-items: center;
gap: 12px;
}
#step-nr {
background: var(–dunkel);
color: #fff;
font-weight: 700;
font-size: 14px;
border-radius: 50%;
width: 34px; height: 34px;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0;
}
#step-titel {
font-weight: 700;
font-size: 17px;
color: var(–dunkel);
}

/* ── INHALT ── */
#inhalt {
max-width: 780px;
margin: 0 auto;
padding: 20px 16px 0;
}

/* ── KARTEN ── */
.karte {
background: var(–white);
border: 1.5px solid var(–border);
border-radius: var(–radius);
padding: 20px;
margin-bottom: 18px;
box-shadow: var(–shadow);
}
.karte-rot   { border-left: 5px solid var(–rot);  }
.karte-gruen { border-left: 5px solid var(–gruen);}
.karte-blau  { border-left: 5px solid var(–blau); }
.karte-gold  { border-left: 5px solid var(–gold); }

h2 {
font-family: ‘Merriweather’, serif;
font-size: 19px;
font-weight: 700;
color: var(–dunkel);
margin-bottom: 12px;
}
h3 {
font-family: ‘Merriweather’, serif;
font-size: 16px;
font-weight: 700;
color: var(–dunkel);
margin-bottom: 10px;
}

/* ── AUTORIN-BADGE ── */
.badge {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 5px 13px;
border-radius: 99px;
font-size: 13px;
font-weight: 700;
margin-bottom: 12px;
}
.badge-rot   { background: var(–rot-hell);   color: var(–rot);   border: 1.5px solid var(–rot); }
.badge-gruen { background: var(–gruen-hell); color: var(–gruen); border: 1.5px solid var(–gruen); }

/* ── GEDICHT-TEXT ── */
.gedicht {
background: var(–bg);
border: 1.5px solid var(–border);
border-radius: 10px;
padding: 18px 20px;
font-family: ‘Merriweather’, serif;
font-style: italic;
font-size: 16px;
line-height: 2;
white-space: pre-wrap;
}
.vers-btn {
display: block;
background: transparent;
border: none;
font-family: ‘Merriweather’, serif;
font-style: italic;
font-size: 16px;
line-height: 2;
cursor: pointer;
text-align: left;
width: 100%;
padding: 2px 6px;
border-radius: 6px;
color: var(–dunkel);
transition: background .15s;
white-space: pre-wrap;
}
.vers-btn:active, .vers-btn:hover { background: #fff8dc; }
.vers-btn.open { background: #fff8dc; }

.vers-hinweis {
display: none;
background: var(–blau-hell);
border-left: 4px solid var(–blau);
border-radius: 0 8px 8px 0;
padding: 10px 14px;
margin: 4px 0 8px 6px;
font-family: ‘Open Sans’, sans-serif;
font-style: normal;
font-size: 14px;
line-height: 1.6;
color: #1a3a6a;
}
.vers-hinweis.open { display: block; }

/* ── MULTIPLE CHOICE ── */
.mc-frage { font-weight: 700; margin-bottom: 12px; font-size: 16px; }
.mc-opt {
display: block;
width: 100%;
padding: 14px 16px;
margin-bottom: 9px;
background: var(–white);
border: 2px solid var(–border);
border-radius: 10px;
font-family: ‘Open Sans’, sans-serif;
font-size: 16px;
text-align: left;
cursor: pointer;
transition: border-color .15s, background .15s;
min-height: 50px;
line-height: 1.4;
color: var(–dunkel);
}
.mc-opt:active { background: var(–grau-hell); }
.mc-opt.richtig { background: var(–gruen-hell); border-color: var(–gruen); color: var(–gruen); font-weight: 700; }
.mc-opt.falsch  { background: var(–rot-hell);   border-color: var(–rot);   color: var(–rot);   font-weight: 700; }
.mc-opt.richtig::after { content: ’ ✓’; }
.mc-opt.falsch::after  { content: ’ ✗’; }

/* ── FEEDBACK ── */
.feedback {
display: none;
padding: 12px 16px;
border-radius: 10px;
font-size: 15px;
line-height: 1.6;
margin-top: 10px;
}
.feedback.show { display: block; }
.feedback.ok   { background: var(–gruen-hell); border-left: 4px solid var(–gruen); color: #145a32; }
.feedback.err  { background: var(–rot-hell);   border-left: 4px solid var(–rot);   color: #7b241c; }
.feedback.info { background: var(–blau-hell);  border-left: 4px solid var(–blau);  color: #1a3a6a; }

/* ── TIPP-BOX ── */
.tipp {
background: var(–gold-hell);
border-left: 4px solid var(–gold);
border-radius: 0 8px 8px 0;
padding: 11px 14px;
font-size: 14px;
line-height: 1.6;
color: #6b5000;
margin-bottom: 14px;
}

/* ══════════════════════════════════════════════
SYMBOL-ZUORDNUNG  – Antippen-Prinzip
══════════════════════════════════════════════
Phase 1: Tippe ein Symbol → markiert (gelb)
Phase 2: Tippe „Domin” oder „Can” → platziert
Platzierten Chip antippen → zurück
══════════════════════════════════════════════ */

.zuordnung-anleitung {
background: var(–dunkel);
color: #fff;
border-radius: 10px;
padding: 12px 16px;
font-size: 14px;
line-height: 1.6;
margin-bottom: 14px;
}
.zuordnung-anleitung strong { color: #4ade80; }

/* Symbol-Pool */
#sym-pool {
display: flex;
flex-wrap: wrap;
gap: 10px;
background: var(–bg);
border: 2px solid var(–border);
border-radius: 10px;
padding: 14px;
min-height: 60px;
margin-bottom: 16px;
}
.sym-chip {
display: flex;
align-items: center;
gap: 7px;
padding: 10px 16px;
border-radius: 99px;
background: var(–dunkel);
color: #fff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
border: 3px solid transparent;
transition: border-color .15s, background .15s;
min-height: 46px;
user-select: none;
}
.sym-chip .em { font-size: 20px; }
.sym-chip:active { opacity: .8; }
.sym-chip.ausgewaehlt {
border-color: #f59e0b;
background: #78350f;
box-shadow: 0 0 0 3px #fde68a;
}

/* Ziel-Spalten */
.ziel-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 14px;
}
.ziel-spalte {
border: 3px dashed var(–border);
border-radius: 10px;
padding: 12px;
min-height: 80px;
cursor: pointer;
transition: border-color .15s, background .15s;
}
.ziel-spalte:active { opacity: .85; }
.ziel-spalte.bereit {
border-color: #f59e0b;
background: #fffbeb;
}
.ziel-header {
font-weight: 700;
font-size: 14px;
padding: 7px 12px;
border-radius: 7px;
text-align: center;
margin-bottom: 10px;
}
.ziel-domin { background: var(–rot);   color: #fff; }
.ziel-can   { background: var(–gruen); color: #fff; }

.ziel-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.ziel-chip {
display: flex;
align-items: center;
gap: 5px;
padding: 7px 12px;
border-radius: 99px;
font-size: 14px;
font-weight: 600;
cursor: pointer;
min-height: 38px;
transition: opacity .15s;
}
.ziel-chip:active { opacity: .7; }
.ziel-chip-domin { background: var(–rot-hell);   color: var(–rot);   border: 2px solid var(–rot); }
.ziel-chip-can   { background: var(–gruen-hell); color: var(–gruen); border: 2px solid var(–gruen); }

/* ── VERGLEICHS-AKKORDEON ── */
.akk-item {
border: 1.5px solid var(–border);
border-radius: 10px;
margin-bottom: 10px;
overflow: hidden;
background: var(–white);
}
.akk-kopf {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 18px;
font-weight: 700;
font-size: 16px;
cursor: pointer;
min-height: 52px;
background: var(–white);
border: none;
width: 100%;
text-align: left;
color: var(–dunkel);
}
.akk-kopf:active { background: var(–grau-hell); }
.akk-pfeil { font-size: 18px; color: var(–grau); transition: transform .2s; }
.akk-kopf.open .akk-pfeil { transform: rotate(180deg); }
.akk-body { display: none; padding: 0 16px 16px; }
.akk-body.open { display: block; }
.akk-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-top: 10px;
}
.akk-zelle {
background: var(–bg);
border-radius: 8px;
padding: 12px 14px;
font-size: 15px;
line-height: 1.6;
}
.akk-label {
display: block;
font-weight: 700;
font-size: 13px;
margin-bottom: 5px;
color: var(–grau);
}
@media(max-width:480px){ .akk-grid, .ziel-grid { grid-template-columns: 1fr; } }

/* ── LÜCKENTEXT ── */
.luecken-text { font-size: 17px; line-height: 2.4; }
.luecke {
display: inline-block;
border: none;
border-bottom: 2.5px solid var(–dunkel);
width: 130px;
padding: 0 4px 2px;
font-family: ‘Open Sans’, sans-serif;
font-size: 16px;
background: transparent;
outline: none;
text-align: center;
color: var(–dunkel);
vertical-align: middle;
margin: 0 4px;
}
.luecke:focus { border-bottom-color: var(–blau); }
.luecke.ok    { border-bottom-color: var(–gruen); color: var(–gruen); }
.luecke.err   { border-bottom-color: var(–rot);   color: var(–rot);   }

/* ── SCHIEBEREGLER ── */
.slider-block { margin-bottom: 18px; }
.slider-frage { font-weight: 600; margin-bottom: 8px; font-size: 15px; }
.slider-row   { display: flex; align-items: center; gap: 12px; }
input[type=range] {
flex: 1; height: 8px;
-webkit-appearance: none;
border-radius: 99px;
background: var(–grau-hell);
outline: none;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
width: 30px; height: 30px;
border-radius: 50%;
background: var(–dunkel);
cursor: pointer;
box-shadow: 0 2px 6px rgba(0,0,0,.2);
}
.slider-val { min-width: 28px; text-align: center; font-weight: 700; font-size: 18px; color: var(–dunkel); }
.slider-lbls { display: flex; justify-content: space-between; font-size: 12px; color: var(–grau); margin-top: 3px; }

/* ── TEXTAREA ── */
textarea {
width: 100%;
padding: 14px;
border: 2px solid var(–border);
border-radius: 10px;
font-family: ‘Open Sans’, sans-serif;
font-size: 16px;
resize: vertical;
min-height: 120px;
background: var(–white);
color: var(–dunkel);
outline: none;
line-height: 1.6;
}
textarea:focus { border-color: var(–blau); }

/* ── STERNE ── */
.sterne-reihe { display: flex; gap: 4px; }
.stern {
font-size: 34px;
cursor: pointer;
color: var(–grau-hell);
min-width: 44px; min-height: 44px;
display: flex; align-items: center; justify-content: center;
transition: color .12s;
user-select: none;
}
.stern.aktiv { color: #f59e0b; }

/* ── FACHBEGRIFF ── */
.fb {
border-bottom: 2px dotted var(–gold);
cursor: help;
position: relative;
}
.fb .tt {
display: none;
position: absolute;
bottom: calc(100% + 8px);
left: 50%;
transform: translateX(-50%);
background: var(–dunkel);
color: #fff;
font-size: 13px;
padding: 8px 12px;
border-radius: 8px;
width: 200px;
z-index: 200;
line-height: 1.5;
text-align: center;
pointer-events: none;
}
.fb .tt::after {
content: ‘’;
position: absolute;
top: 100%; left: 50%;
transform: translateX(-50%);
border: 6px solid transparent;
border-top-color: var(–dunkel);
}
.fb.aktiv .tt, .fb:hover .tt { display: block; }

/* ── BUTTONS ── */
.btn-weiter {
display: block;
width: 100%;
background: var(–dunkel);
color: #fff;
border: none;
border-radius: 12px;
font-family: ‘Open Sans’, sans-serif;
font-weight: 700;
font-size: 17px;
padding: 17px 20px;
cursor: pointer;
margin-top: 18px;
min-height: 56px;
transition: background .15s;
text-align: center;
}
.btn-weiter:active { background: #333; }

.btn {
display: inline-block;
padding: 12px 22px;
border-radius: 10px;
font-family: ‘Open Sans’, sans-serif;
font-weight: 700;
font-size: 15px;
cursor: pointer;
border: none;
min-height: 46px;
transition: opacity .15s;
}
.btn:active { opacity: .8; }
.btn-dunkel { background: var(–dunkel); color: #fff; }
.btn-gruen  { background: var(–gruen);  color: #fff; }
.btn-rot    { background: var(–rot);    color: #fff; }
.btn-gold   { background: #92400e;       color: #fff; }

/* ── QUIZ-ERGEBNIS ── */
.ergebnis-box { text-align: center; padding: 30px 20px; }
.ergebnis-zahl { font-family: ‘Merriweather’, serif; font-size: 64px; font-weight: 700; line-height: 1; }
.ergebnis-text { font-size: 17px; margin-top: 10px; line-height: 1.7; color: var(–grau); }

/* ── ABSCHLUSS ── */
.abschluss-box {
background: var(–dunkel);
color: #fff;
border-radius: 14px;
padding: 28px 22px;
text-align: center;
margin-bottom: 18px;
}
.abschluss-box h2 { color: #4ade80; margin-bottom: 12px; }
.abschluss-box p  { color: #c0cce0; line-height: 1.7; }

/* ── INFO-BOX ── */
.info-box {
background: var(–blau-hell);
border-left: 4px solid var(–blau);
border-radius: 0 10px 10px 0;
padding: 13px 16px;
font-size: 15px;
line-height: 1.65;
color: #1a3a6a;
margin-bottom: 16px;
}

/* ── ANIMATION ── */
@keyframes slide-in {
from { opacity:0; transform:translateY(14px); }
to   { opacity:1; transform:translateY(0); }
}
#inhalt { animation: slide-in .3s ease; }
</style>

</head>
<body>

<header>
  <h1>Zwei Stimmen – ein Thema</h1>
  <div class="meta">KLASSE 9 &nbsp;·&nbsp; GEDICHTVERGLEICH</div>
</header>

<div id="fortschritt-wrap">
  <div id="fortschritt-bar"><div id="fortschritt-fill"></div></div>
  <div id="fortschritt-text">Schritt 1 von 8</div>
</div>

<div id="step-kopf">
  <div id="step-nr">1</div>
  <div id="step-titel">Einstieg</div>
</div>

<div id="inhalt"></div>

<!-- ══════════════════════════════════════════════════════════════
     SCHRITT-DEFINITIONEN (als JSON im Script)
══════════════════════════════════════════════════════════════ -->

<script>
/* ═══ DATEN ═══ */
const SCHRITTE = [
  { nr:1, titel:'Einstieg – Die zwei Autorinnen' },
  { nr:2, titel:'Gedicht I – Hilde Domin' },
  { nr:3, titel:'Gedicht II – Safiye Can' },
  { nr:4, titel:'Symbole zuordnen' },
  { nr:5, titel:'Gedichte vergleichen' },
  { nr:6, titel:'Sprache & Stilmittel' },
  { nr:7, titel:'Wissens-Quiz' },
  { nr:8, titel:'Eigenes Schreiben' },
];

/* ═══ ZUSTAND ═══ */
let schritt = 0;        // 0-basiert
let symAusgewaehlt = null;  // aktuell angetippter Symbol-Chip

/* ══════════════════════
   NAVIGATION
══════════════════════ */
function zeigeSchritt(idx) {
  schritt = idx;
  const s = SCHRITTE[idx];
  document.getElementById('step-nr').textContent = s.nr;
  document.getElementById('step-titel').textContent = s.titel;
  const pct = Math.round(idx / (SCHRITTE.length - 1) * 100);
  document.getElementById('fortschritt-fill').style.width = pct + '%';
  document.getElementById('fortschritt-text').textContent =
    'Schritt ' + s.nr + ' von ' + SCHRITTE.length;

  const inhalt = document.getElementById('inhalt');
  inhalt.innerHTML = '';
  inhalt.style.animation = 'none';
  inhalt.offsetHeight; // reflow
  inhalt.style.animation = '';

  RENDER[idx]();
  window.scrollTo(0,0);
}

function weiter() { if (schritt < SCHRITTE.length-1) zeigeSchritt(schritt+1); }

/* ══════════════════════
   HILFS-FUNKTIONEN
══════════════════════ */
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function karte(cls, html) { return el('div','karte ' + (cls||''), html); }

function mcGruppe(frage, optionen) {
  // optionen: [{text, richtig, erkl}]
  // Falsche Antworten: nach 1,2 s zurücksetzen → unbegrenzte Versuche
  const wrap = el('div');
  const p = el('p','mc-frage', frage);
  wrap.appendChild(p);
  const fb = el('div','feedback');
  let gesperrt = false;

  optionen.forEach(o => {
    const btn = el('button','mc-opt', o.text);
    btn.addEventListener('click', function() {
      if (gesperrt) return;
      gesperrt = true;
      // Alle Buttons kurz sperren
      wrap.querySelectorAll('.mc-opt').forEach(b => b.style.pointerEvents = 'none');

      if (o.richtig) {
        // Richtig: dauerhaft markieren
        this.classList.add('richtig');
        fb.textContent = o.erkl;
        fb.className = 'feedback show ok';
      } else {
        // Falsch: markieren, Feedback zeigen, dann nach 1,2 s zurücksetzen
        this.classList.add('falsch');
        fb.textContent = o.erkl;
        fb.className = 'feedback show err';
        const falscherBtn = this;
        setTimeout(() => {
          falscherBtn.classList.remove('falsch');
          fb.className = 'feedback'; // Feedback ausblenden
          wrap.querySelectorAll('.mc-opt').forEach(b => b.style.pointerEvents = '');
          gesperrt = false;
        }, 1200);
      }
    });
    wrap.appendChild(btn);
  });
  wrap.appendChild(fb);
  wrap.classList.add('mc-gruppe-wrap');
  return wrap;
}

function btnWeiter(label) {
  const b = el('button','btn-weiter', label || 'Weiter →');
  b.addEventListener('click', weiter);
  return b;
}

/* ══════════════════════
   VERS-HINWEIS
══════════════════════ */
function versBlock(text, hinweis) {
  const wrap = el('div');
  const btn = el('button','vers-btn', text);
  const box = el('div','vers-hinweis', '🔍 ' + hinweis);
  btn.addEventListener('click', function() {
    const open = box.classList.toggle('open');
    btn.classList.toggle('open', open);
  });
  wrap.appendChild(btn);
  wrap.appendChild(box);
  return wrap;
}

/* ══════════════════════════════════════════════════
   SYMBOL-ZUORDNUNG
══════════════════════════════════════════════════ */
const SYMBOLE = [
  { em:'🌿', txt:'Mandelbaum',              ziel:'domin' },
  { em:'🌹', txt:'Rose',                    ziel:'can'   },
  { em:'🐦', txt:'Nachtigall',              ziel:'can'   },
  { em:'⛵', txt:'Schiff ohne Hafen',       ziel:'domin' },
  { em:'🪨', txt:'Stein',                   ziel:'can'   },
  { em:'🐬', txt:'Delfine am Bug',          ziel:'domin' },
  { em:'🛏️', txt:'Betten in vielen Ländern',ziel:'domin' },
  { em:'👗', txt:'Wäscheleine im Herzen',   ziel:'can'   },
  { em:'☀️', txt:'gleiche Sonne überall',   ziel:'domin' },
];

const SYMBOL_ERKL = {

function bauSymbolZuordnung(container) {
  symAusgewaehlt = null;

  // Anleitung
  const anl = el('div','zuordnung-anleitung',
    '<strong>So geht\'s:</strong> 1. Tippe ein Symbol an (wird gelb markiert). ' +
    '2. Tippe dann auf „Domin" oder „Can". ' +
    'Platzierten Chip antippen → springt zurück.');
  container.appendChild(anl);

  // Pool
  const pool = el('div','','');
  pool.id = 'sym-pool';
  SYMBOLE.forEach(s => {
    const chip = el('div','sym-chip');
    chip.dataset.ziel   = s.ziel;
    chip.dataset.txt    = s.txt;
    chip.innerHTML = '<span class="em">' + s.em + '</span>' + s.txt;
    chip.addEventListener('click', () => symTippen(chip));
    pool.appendChild(chip);
  });
  container.appendChild(pool);

  // Ziel-Spalten
  const grid = el('div','ziel-grid');

  ['domin','can'].forEach(ziel => {
    const col = el('div','ziel-spalte');
    col.id = 'ziel-' + ziel;
    col.innerHTML = '<div class="ziel-header ziel-' + ziel + '">' +
      (ziel === 'domin' ? '🌿 Domin' : '🌹 Can') + '</div>' +
      '<div class="ziel-chips" id="chips-' + ziel + '"></div>';
    col.addEventListener('click', (e) => {
      // Nur klicken, wenn nicht auf einen Rück-Chip
      if (e.target.classList.contains('ziel-chip')) return;
      symPlatzieren(ziel);
    });
    grid.appendChild(col);
  });
  container.appendChild(grid);

  const fb = el('div','feedback'); fb.id = 'sym-fb';
  container.appendChild(fb);

  const pruefBtn = el('button','btn btn-dunkel', 'Alle prüfen');
  pruefBtn.style.marginTop = '4px';
  pruefBtn.addEventListener('click', symAllesPruefen);
  container.appendChild(pruefBtn);

  const resetBtn = el('button','btn','Neu starten');
  resetBtn.style.cssText = 'margin-top:10px;margin-left:10px;background:var(--grau-hell);color:var(--dunkel)';
  resetBtn.addEventListener('click', () => {
    container.innerHTML = '';
    bauSymbolZuordnung(container);
  });
  container.appendChild(resetBtn);
}

function symTippen(chip) {
  if (chip.classList.contains('platziert')) return;
  // De-select wenn bereits ausgewählt
  if (symAusgewaehlt === chip) {
    chip.classList.remove('ausgewaehlt');
    symAusgewaehlt = null;
    // Ziel-Spalten beruhigen
    document.querySelectorAll('.ziel-spalte').forEach(z => z.classList.remove('bereit'));
    return;
  }
  // Anderen de-selecten
  if (symAusgewaehlt) symAusgewaehlt.classList.remove('ausgewaehlt');
  chip.classList.add('ausgewaehlt');
  symAusgewaehlt = chip;
  // Spalten animieren
  document.querySelectorAll('.ziel-spalte').forEach(z => z.classList.add('bereit'));
}

function symPlatzieren(ziel) {
  if (!symAusgewaehlt) {
    const fb = document.getElementById('sym-fb');
    fb.textContent = '⬆ Tippe zuerst ein Symbol an!';
    fb.className = 'feedback show err';
    return;
  }
  const chip = symAusgewaehlt;
  const txt  = chip.dataset.txt;
  const fb   = document.getElementById('sym-fb');

  chip.classList.remove('ausgewaehlt');
  chip.classList.add('platziert');
  chip.style.opacity = '0.3';
  chip.style.pointerEvents = 'none';
  symAusgewaehlt = null;
  document.querySelectorAll('.ziel-spalte').forEach(z => z.classList.remove('bereit'));

  // Ziel-Chip erzeugen
  const zchip = el('div','ziel-chip ziel-chip-' + ziel,
    '<span>' + chip.querySelector('.em').textContent + '</span>' + txt);
  zchip.dataset.txt  = txt;
  zchip.dataset.ziel = ziel;
  zchip.addEventListener('click', () => symZurueck(zchip, chip));
  document.getElementById('chips-' + ziel).appendChild(zchip);

  fb.textContent = '„' + txt + '" wurde zu ' + (ziel === 'domin' ? 'Domin' : 'Can') + ' gelegt. Tippe den Chip an, um ihn zurückzuholen.';
  fb.className = 'feedback show info';
}

function symZurueck(zchip, origChip) {
  zchip.remove();
  origChip.classList.remove('platziert');
  origChip.style.opacity  = '';
  origChip.style.pointerEvents = '';
  origChip.style.outline  = '';
  const fb = document.getElementById('sym-fb');
  fb.textContent = '„' + origChip.dataset.txt + '" ist wieder im Pool.';
  fb.className = 'feedback show info';
}

function symAllesPruefen() {
  let richtig = 0, gesamt = 0;
  const fb = document.getElementById('sym-fb');
  let meldungen = [];

  document.querySelectorAll('.ziel-chip').forEach(zchip => {
    gesamt++;
    const txt  = zchip.dataset.txt;
    const ziel = zchip.dataset.ziel;
    const korrekt = SYMBOLE.find(s => s.txt === txt)?.ziel === ziel;
    if (korrekt) {
      richtig++;
      zchip.style.outline = '3px solid var(--gruen)';
      const erkl = SYMBOL_ERKL[ziel]?.[txt];
      if (erkl) meldungen.push('✓ ' + txt + ': ' + erkl);
    } else {
      zchip.style.outline = '3px solid var(--rot)';
      const sollte = SYMBOLE.find(s=>s.txt===txt)?.ziel;
      meldungen.push('✗ ' + txt + ' gehört zu ' + (sollte==='domin'?'Domin':'Can'));
    }
  });

  if (gesamt === 0) {
    fb.textContent = 'Ordne zuerst Symbole zu!';
    fb.className = 'feedback show err';
    return;
  }
  fb.innerHTML = '<strong>' + richtig + ' von ' + gesamt + ' richtig.</strong><br>' + meldungen.join('<br>');
  fb.className = 'feedback show ' + (richtig === gesamt ? 'ok' : richtig >= gesamt*.6 ? 'info' : 'err');
}

let quizAntworten = {};
let quizCount = 0;

function bauQuiz(container) {
  quizAntworten = {};
  quizCount = 0;
  const fb = el('div','feedback'); fb.id = 'quiz-global-fb';
  QUIZ.forEach((q,qi) => {
    const k = karte('', '');
    const nr = el('p','', '<span style="font-size:13px;color:var(--grau);font-weight:600">Frage ' + (qi+1) + ' / ' + QUIZ.length + '</span>');
    k.appendChild(nr);
    const mc = mcGruppe(q.f, q.o.map(([text,richtig,erkl]) => ({text,richtig,erkl})));
    // Quizzählung: nur bei richtiger Antwort zählen (einmalig pro Frage)
    mc.querySelectorAll('.mc-opt').forEach((btn,bi) => {
      btn.addEventListener('click', function() {
        const istRichtig = q.o[bi][1];
        if (!istRichtig) return; // falsch → mcGruppe setzt zurück, kein Zählen
        if (quizAntworten[qi] !== undefined) return; // schon gezählt
        quizAntworten[qi] = true;
        quizCount++;
        if (quizCount === QUIZ.length) {
          document.getElementById('quiz-auswerten-btn').style.display = 'block';
        }
      });
    });
    k.appendChild(mc);
    container.appendChild(k);
  });

  const auswBtn = el('button','btn btn-dunkel', 'Ergebnis anzeigen');
  auswBtn.id = 'quiz-auswerten-btn';
  auswBtn.style.cssText = 'display:none;width:100%;margin-top:8px;padding:16px;font-size:17px;border-radius:12px';
  auswBtn.addEventListener('click', () => {
    const punkte = Object.values(quizAntworten).filter(Boolean).length;
    const res = karte('');
    const texte = [
      'Noch etwas Übung nötig – lies die Gedichte noch einmal!',
      'Gut! Die wichtigsten Inhalte hast du schon gut erfasst.',
      'Sehr gut! Du kennst die Gedichte und ihre Besonderheiten ausgezeichnet.',
    ];
    const t = punkte <= 3 ? 0 : punkte <= 6 ? 1 : 2;
    res.innerHTML = '<div class="ergebnis-box">' +
      '<div class="ergebnis-zahl" style="color:' + (punkte>=6?'var(--gruen)':punkte>=4?'var(--gold)':'var(--rot)') + '">' + punkte + '/' + QUIZ.length + '</div>' +
      '<div class="ergebnis-text">' + texte[t] + '</div></div>';
    auswBtn.replaceWith(res);
    container.appendChild(btnWeiter('Weiter: Eigenes Schreiben →'));
  });
  container.appendChild(auswBtn);
}

/* ══════════════════════
   LÜCKENTEXT-PRÜFUNG
══════════════════════ */
function mkInput(loesung) {
  return '<input class="luecke" data-loesung="' + loesung.toLowerCase() + '" type="text" autocomplete="off" autocorrect="off" spellcheck="false">';
}
function lueckenPruefen(container) {
  let ok = 0, total = 0;
  container.querySelectorAll('.luecke').forEach(inp => {
    total++;
    const val = inp.value.trim().toLowerCase();
    const sol = inp.dataset.loesung;
    // Flexibler Vergleich (Teilstring reicht)
    if (val && sol.includes(val) || val === sol) {
      inp.classList.add('ok'); inp.classList.remove('err'); ok++;
    } else {
      inp.classList.add('err'); inp.classList.remove('ok');
    }
  });
  let fb = container.querySelector('.luecken-fb');
  if (!fb) { fb = el('div','feedback'); fb.classList.add('luecken-fb'); container.appendChild(fb); }
  fb.textContent = ok + ' von ' + total + ' richtig.';
  fb.className = 'feedback luecken-fb show ' + (ok===total?'ok':ok>=total*.5?'info':'err');
}

/* ══════════════════════
   STERNE
══════════════════════ */
function bauSterne(container) {
  for (let i=1;i<=5;i++) {
    const s = el('div','stern','★');
    s.dataset.val = i;
    s.addEventListener('click', function() {
      const v = parseInt(this.dataset.val);
      container.querySelectorAll('.stern').forEach(st => {
        st.classList.toggle('aktiv', parseInt(st.dataset.val) <= v);
      });
    });
    container.appendChild(s);
  }
}

/* ══════════════════════
   FACHBEGRIFF-TOUCH
══════════════════════ */
document.addEventListener('click', e => {
  const f = e.target.closest('.fb');
  document.querySelectorAll('.fb.aktiv').forEach(x => { if(x!==f) x.classList.remove('aktiv'); });
  if (f) f.classList.toggle('aktiv');
});

/* ══════════════════════
   START
══════════════════════ */
zeigeSchritt(0);
</script>
