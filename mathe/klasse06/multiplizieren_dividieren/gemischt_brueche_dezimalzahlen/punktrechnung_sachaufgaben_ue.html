<style>

  .badge{

  /* ---- Brüche ---- */
  .frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 2px;}
  .frac>span{display:block;padding:0 5px;line-height:1.05;}

  .mixed{display:inline-flex;align-items:center;gap:3px;vertical-align:middle;}

  .weiter-wrap{margin-top:22px;display:none;}

  .progress-note{text-align:center;font-size:.9rem;color:#5a7990;margin-top:14px;}

  /* ---- Auswertung ---- */
  .result-grid{display:flex;flex-direction:column;gap:10px;}
  .result-row{

  .timer-box{

  .timer-disp{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:var(--blau);text-align:center;}

<script>
/* =========================================================
   ZUSTAND: pro Karte × Stufe getrennt im JS-Speicher
   ========================================================= */
const STATE = {};   // STATE[cardId][level] = { [taskId]: {checked, correct, vals:{}, tips:int} }

function ensure(cardId, level){
  if(!STATE[cardId]) STATE[cardId] = {};
  if(!STATE[cardId][level]) STATE[cardId][level] = {};
  return STATE[cardId][level];
}

/* aktuelle Stufe je Karte */
const CUR_LEVEL = {};

/* =========================================================
   HILFSFUNKTIONEN
   ========================================================= */
function normalizeMul(s){
  return s
    .replace(/\s/g,'')
    .replace(/\D+/g,'·')
    .replace(/·+/g,'·')
    .replace(/^·|·$/g,'')
    .toLowerCase();
}
// Zahl normalisieren: Komma -> Punkt, Leerzeichen weg
function normNum(s){
  return (s||'').toString().trim().replace(/\s/g,'').replace(',', '.');
}
function numEq(a, b){
  const x = parseFloat(normNum(a));
  if(isNaN(x)) return false;
  return Math.abs(x - b) < 1e-9;
}
// Einheit: Klein, Leerzeichen weg, einfache Synonyme
function unitEq(input, accepted){
  const u = (input||'').toLowerCase().replace(/\s|\./g,'');
  return accepted.some(a => a.toLowerCase().replace(/\s|\./g,'') === u);
}
function frac(z,n){return `<span class="frac"><span>${z}</span><span>${n}</span></span>`;}
function mixed(g,z,n){return `<span class="mixed">${g}&thinsp;${frac(z,n)}</span>`;}

/* =========================================================
   AUFGABEN-DEFINITION
   Jede Karte: {id, nr, title, sub, repeat?, levels:{grundlagen,fortgeschritten,profi}}
   Jede Stufe: array von Aufgaben.
   Aufgabentyp "num+unit": Felder val(Zahl)+unit(Einheit)
   Aufgabentyp "num": nur Zahl
   tips: array gestufter Tipps (letzter = Lösung)
   ========================================================= */
const LEVELS = ['grundlagen','fortgeschritten','profi'];
const LEVEL_LABEL = {grundlagen:'Grundlagen', fortgeschritten:'Fortgeschritten', profi:'Profi'};

const CARDS = [
  /* ---------- KARTE 1: MAL MIT BRÜCHEN ---------- */
  {
    id:'c1', nr:1, title:'Mal mit Brüchen', sub:'Multiplizieren von Brüchen im Sachkontext',
    levels:{
      grundlagen:[
        { id:'c1g1', kind:'num+unit',
          q:`In einer Flasche sind ${frac(3,4)} Liter Saft. Lena trinkt davon ${frac(1,2)} der Flasche. Wie viele Liter trinkt sie?`,
          val:0.375, unit:['l','liter'], unitLabel:'Liter',
          tips:['Anteil eines Anteils heißt „mal".', 'Rechne ${frac(1,2)}·${frac(3,4)} = Zähler·Zähler durch Nenner·Nenner.', 'Lösung: ${frac(3,8)} Liter = 0,375 Liter.'] },
        { id:'c1g2', kind:'num+unit',
          q:`Ein Rezept braucht ${frac(2,3)} kg Mehl. Du machst die Hälfte des Rezepts. Wie viel Mehl brauchst du?`,
          val:0.333333333333, unit:['kg'], unitLabel:'kg', tol:0.001,
          tips:['Die Hälfte bedeutet mal ${frac(1,2)}.', 'Rechne ${frac(1,2)}·${frac(2,3)}.', 'Lösung: ${frac(2,6)} = ${frac(1,3)} kg ≈ 0,333 kg.'] },
      ],
      fortgeschritten:[
        { id:'c1f1', kind:'num+unit',
          q:`Ein Grundstück ist ${frac(5,6)} Hektar groß. Davon werden ${frac(3,5)} bebaut. Wie groß ist die bebaute Fläche in Hektar?`,
          val:0.5, unit:['ha','hektar'], unitLabel:'Hektar',
          tips:['„Davon" bedeutet Multiplikation.', 'Rechne ${frac(3,5)}·${frac(5,6)} und kürze vorher.', 'Lösung: ${frac(15,30)} = ${frac(1,2)} ha = 0,5 ha.'] },
        { id:'c1f2', kind:'num+unit',
          q:`Eine Kanne fasst ${mixed(1,1,2)} Liter Tee. Du füllst sie zu ${frac(2,3)}. Wie viele Liter Tee sind in der Kanne?`,
          val:1, unit:['l','liter'], unitLabel:'Liter',
          tips:['Wandle ${mixed(1,1,2)} erst in einen Bruch um.', '${mixed(1,1,2)} = ${frac(3,2)}; rechne ${frac(2,3)}·${frac(3,2)}.', 'Lösung: ${frac(6,6)} = 1 Liter.'] },
      ],
      profi:[
        { id:'c1p1', kind:'num+unit',
          q:`Ein Beet ist ${frac(4,5)} m² groß. ${frac(1,2)} davon werden mit Erdbeeren bepflanzt, zusätzlich noch ${frac(1,10)} m² mit Kräutern. Wie viel m² sind bepflanzt? (Punkt vor Strich!)`,
          val:0.5, unit:['m²','m2','quadratmeter'], unitLabel:'m²',
          tips:['Erst die Multiplikation, dann die Addition (Punkt vor Strich).', 'Rechne ${frac(1,2)}·${frac(4,5)} und addiere dann ${frac(1,10)}.', 'Lösung: ${frac(4,10)} + ${frac(1,10)} = ${frac(5,10)} = ${frac(1,2)} m² = 0,5 m².'] },
        { id:'c1p2', kind:'num+unit',
          q:`Ein Saftmix: ${frac(2,3)} L Apfelsaft werden verdreifacht (·3) und davon ${frac(1,4)} L abgezogen. Wie viele Liter Saftmix bleiben? (Punkt vor Strich!)`,
          val:1.75, unit:['l','liter'], unitLabel:'Liter',
          tips:['Erst ${frac(2,3)}·3 rechnen, dann ${frac(1,4)} subtrahieren.', '${frac(2,3)}·3 = 2; dann 2 − ${frac(1,4)}.', 'Lösung: 2 − ${frac(1,4)} = ${mixed(1,3,4)} L = 1,75 L.'] },
      ],
    }
  },

  /* ---------- KARTE 2: GETEILT MIT BRÜCHEN ---------- */
  {
    id:'c2', nr:2, title:'Geteilt mit Brüchen', sub:'Dividieren von Brüchen im Sachkontext',
    levels:{
      grundlagen:[
        { id:'c2g1', kind:'num+unit',
          q:`Du hast ${frac(3,4)} Liter Saft und füllst ihn in Gläser zu je ${frac(1,4)} Liter. Wie viele Gläser kannst du füllen?`,
          val:3, unit:['gläser','glaeser','stück','stueck'], unitLabel:'Gläser',
          tips:['„Wie oft passt … hinein?" ist eine Division.', 'Durch einen Bruch teilen = mit Kehrwert mal: ${frac(3,4)}·${frac(4,1)}.', 'Lösung: ${frac(3,4)} : ${frac(1,4)} = 3 Gläser.'] },
        { id:'c2g2', kind:'num+unit',
          q:`Ein Band ist ${frac(6,7)} m lang und wird in Stücke von je ${frac(2,7)} m geschnitten. Wie viele Stücke entstehen?`,
          val:3, unit:['stücke','stuecke','stück','stueck'], unitLabel:'Stücke',
          tips:['Wie oft passt ${frac(2,7)} in ${frac(6,7)}?', 'Mit Kehrwert: ${frac(6,7)}·${frac(7,2)}.', 'Lösung: 3 Stücke.'] },
      ],
      fortgeschritten:[
        { id:'c2f1', kind:'num+unit',
          q:`${frac(3,4)} kg Kaffee werden gleichmäßig auf 6 Dosen verteilt. Wie viel kg kommt in eine Dose?`,
          val:0.125, unit:['kg'], unitLabel:'kg',
          tips:['Aufteilen auf 6 = geteilt durch 6.', 'Rechne ${frac(3,4)} : 6 = ${frac(3,4)}·${frac(1,6)}.', 'Lösung: ${frac(3,24)} = ${frac(1,8)} kg = 0,125 kg.'] },
        { id:'c2f2', kind:'num+unit',
          q:`Eine Strecke ist ${mixed(2,1,2)} km lang. Sie wird in Abschnitte von je ${frac(5,8)} km eingeteilt. Wie viele Abschnitte sind es?`,
          val:4, unit:['abschnitte','stück','stueck'], unitLabel:'Abschnitte',
          tips:['${mixed(2,1,2)} = ${frac(5,2)}.', 'Rechne ${frac(5,2)} : ${frac(5,8)} = ${frac(5,2)}·${frac(8,5)}.', 'Lösung: ${frac(40,10)} = 4 Abschnitte.'] },
      ],
      profi:[
        { id:'c2p1', kind:'num+unit',
          q:`${frac(7,8)} L Sirup, davon werden zuerst ${frac(3,8)} L verbraucht. Der Rest wird auf Gläser zu je ${frac(1,8)} L verteilt. Wie viele Gläser? (Punkt vor Strich!)`,
          val:4, unit:['gläser','glaeser','stück','stueck'], unitLabel:'Gläser',
          tips:['Erst den Rest berechnen (Subtraktion), dann teilen.', 'Rest: ${frac(7,8)} − ${frac(3,8)} = ${frac(4,8)} = ${frac(1,2)}. Dann : ${frac(1,8)}.', 'Lösung: ${frac(1,2)} : ${frac(1,8)} = 4 Gläser.'] },
        { id:'c2p2', kind:'num+unit',
          q:`Ein Seil ist ${frac(9,10)} m lang. Es wird halbiert (:2) und ein Stück von ${frac(1,5)} m abgeschnitten. Wie lang ist das Reststück? (Punkt vor Strich!)`,
          val:0.25, unit:['m','meter'], unitLabel:'Meter',
          tips:['Erst die Division (:2), dann die Subtraktion.', '${frac(9,10)} : 2 = ${frac(9,20)}; dann − ${frac(1,5)} = − ${frac(4,20)}.', 'Lösung: ${frac(9,20)} − ${frac(4,20)} = ${frac(5,20)} = ${frac(1,4)} m = 0,25 m.'] },
      ],
    }
  },

  /* ---------- KARTE 3: MAL MIT DEZIMALZAHLEN ---------- */
  {
    id:'c3', nr:3, title:'Mal mit Dezimalzahlen', sub:'Multiplizieren von Dezimalzahlen im Sachkontext',
    levels:{
      grundlagen:[
        { id:'c3g1', kind:'num+unit',

/* Template-Strings in den Tipps/Fragen mit frac() auflösen */
function resolveTpl(s){
  if(typeof s !== 'string') return s;
  // Ersetze ${frac(a,b)} und ${mixed(a,b,c)}
  return s.replace(/\$\{frac\((\d+),(\d+)\)\}/g, (_,a,b)=>frac(a,b))
          .replace(/\$\{mixed\((\d+),(\d+),(\d+)\)\}/g, (_,a,b,c)=>mixed(a,b,c));
}

   RENDERING

const tabsEl = document.getElementById('tabs');
const cardsEl = document.getElementById('cards');

CARDS.forEach((card, ci)=>{
  CUR_LEVEL[card.id] = 'grundlagen';

  // Tab
  const tab = document.createElement('button');
  tab.className = 'tab' + (card.repeat?' repeat':'');
  tab.id = 'tab-'+card.id;
  tab.innerHTML = `<span class="nr">${card.nr}</span>${card.title}`;
  tab.addEventListener('click', ()=>showCard(card.id));
  tabsEl.appendChild(tab);

  // Card container
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'card-'+card.id;
  div.innerHTML = `
    <div class="card-head">
      <h2>Karte ${card.nr}: ${card.title}</h2>
      <div class="sub">${card.sub}</div>
    </div>
    <div class="card-body">
      ${card.repeat?'<div class="info-strip">🔁 <b>Wiederholungskarte:</b> früheres Thema – das Umwandeln zwischen Brüchen und Dezimalzahlen. Auch hier kannst du die Niveaustufe wechseln.</div>':''}
      <div class="level-toggle" id="lt-${card.id}">
        <div class="lt-label" onclick="toggleLevelBox('${card.id}')">
          <span class="chev">▾</span> Niveaustufe wählen — aktuell: <span id="curlbl-${card.id}">Grundlagen</span>
        </div>
        <div class="lt-buttons" id="ltb-${card.id}"></div>
      </div>
      <div id="tasks-${card.id}"></div>
    </div>`;
  cardsEl.appendChild(div);

  // Level buttons
  const ltb = div.querySelector('#ltb-'+card.id);
  LEVELS.forEach(lv=>{
    if(!card.levels[lv] || card.levels[lv].length===0) return;
    const b = document.createElement('button');
    b.className = 'lvl' + (lv==='grundlagen'?' active':'');
    b.id = `lvlbtn-${card.id}-${lv}`;
    b.textContent = LEVEL_LABEL[lv];
    b.addEventListener('click', ()=>setLevel(card.id, lv));
    ltb.appendChild(b);
  });

  renderTasks(card.id, 'grundlagen');
});

function toggleLevelBox(cardId){
  document.getElementById('lt-'+cardId).classList.toggle('collapsed');
}

function setLevel(cardId, lv){
  CUR_LEVEL[cardId] = lv;
  document.querySelectorAll(`#ltb-${cardId} .lvl`).forEach(b=>b.classList.remove('active'));
  document.getElementById(`lvlbtn-${cardId}-${lv}`).classList.add('active');
  document.getElementById('curlbl-'+cardId).textContent = LEVEL_LABEL[lv];
  renderTasks(cardId, lv);   // baut Ansicht neu, befüllt aus gespeichertem Zustand
  updateProgress();
}

function getCard(cardId){return CARDS.find(c=>c.id===cardId);}

function renderTasks(cardId, lv){
  const card = getCard(cardId);
  const tasks = card.levels[lv];
  const cont = document.getElementById('tasks-'+cardId);
  cont.innerHTML = '';
  const st = ensure(cardId, lv);

  tasks.forEach((t, i)=>{
    const taskDiv = document.createElement('div');
    taskDiv.className = 'task';
    const saved = st[t.id] || {};
    let inner = `<span class="q-nr">Aufgabe ${i+1}</span>
      <p class="q-text">${resolveTpl(t.q)}</p>`;

    if(t.kind==='num+unit'){
      inner += `
        <div class="answer-row">
          <label>Ergebnis:</label>
          <input class="num" inputmode="decimal" id="in-${t.id}-val" placeholder="Zahl" value="${saved.vVal??''}">
          <input class="unit" id="in-${t.id}-unit" placeholder="Einheit" value="${saved.vUnit??''}">
        </div>`;
    } else if(t.kind==='num'){
      inner += `
        <div class="answer-row">
          <label>Ergebnis:</label>
          <input class="num" inputmode="decimal" id="in-${t.id}-val" placeholder="Zahl" value="${saved.vVal??''}">
        </div>`;
    } else if(t.kind==='frac'){
      inner += `
        <div class="answer-row">
          <label>Bruch (Zähler / Nenner):</label>
          <input class="num" style="width:80px" inputmode="numeric" id="in-${t.id}-z" placeholder="Zähler" value="${saved.vZ??''}">
          <span style="font-weight:800;font-size:1.3rem;">—</span>
          <input class="num" style="width:80px" inputmode="numeric" id="in-${t.id}-n" placeholder="Nenner" value="${saved.vN??''}">
        </div>`;
    }

    inner += `
      <div class="btn-row">
        <button class="btn btn-check" onclick="checkTask('${cardId}','${lv}','${t.id}')">Prüfen</button>
        <button class="btn btn-clear" id="clr-${t.id}" style="display:none" onclick="clearTask('${cardId}','${lv}','${t.id}')">Leeren</button>
      </div>
      <div class="fb" id="fb-${t.id}"></div>
      <div class="tipstack" id="tips-${t.id}"></div>`;

    taskDiv.innerHTML = inner;
    cont.appendChild(taskDiv);

    // Zustand wiederherstellen (Markierungen, Feedback, Tipps)
    if(saved.checked){
      applyFeedback(cardId, lv, t.id, saved.correct, /*restore*/true);
    }
    if(saved.tipsShown){
      const ts = document.getElementById('tips-'+t.id);
      buildTips(t, ts);
      for(let k=0;k<saved.tipsShown;k++){
        const tip = ts.querySelector(`#tip-${t.id}-${k}`);
        if(tip) tip.classList.add('show');
      }
      // Button-Text anpassen
      const tb = ts.querySelector('#tipbtn-'+t.id);
      if(tb && saved.tipsShown>=t.tips.length) tb.style.display='none';
    }
  });

  if(window.MathJax && MathJax.typesetPromise){
    MathJax.typesetPromise([cont]).catch(()=>{});
  }
}

function buildTips(t, container){
  if(container.dataset.built) return;
  container.dataset.built = '1';
  const btn = document.createElement('button');
  btn.className = 'btn btn-tip';
  btn.id = 'tipbtn-'+t.id;
  btn.textContent = '💡 Tipp anzeigen';
  container.appendChild(btn);
  t.tips.forEach((tip, k)=>{
    const d = document.createElement('div');
    d.className = 'tip';
    d.id = `tip-${t.id}-${k}`;
    const isLast = (k===t.tips.length-1);
    d.innerHTML = (isLast?'<b>Lösungsweg:</b> ':`<b>Tipp ${k+1}:</b> `) + resolveTpl(tip);
    container.appendChild(d);
  });
  btn.addEventListener('click', ()=>{
    // nächsten verborgenen Tipp zeigen
    const cardId = btn.dataset.card, lv = btn.dataset.lv;
    let shown = 0;
    t.tips.forEach((_,k)=>{ if(container.querySelector(`#tip-${t.id}-${k}`).classList.contains('show')) shown++; });
    if(shown < t.tips.length){
      container.querySelector(`#tip-${t.id}-${shown}`).classList.add('show');
      shown++;
    }
    // Zustand merken
    const st = ensure(btn.dataset.card, btn.dataset.lv);
    st[t.id] = st[t.id]||{};
    st[t.id].tipsShown = shown;
    if(shown>=t.tips.length) btn.style.display='none';
    if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([container]).catch(()=>{});
  });
}

function readInputs(t){
  const o = {};
  if(t.kind==='num+unit'){
    o.vVal = document.getElementById(`in-${t.id}-val`).value;
    o.vUnit = document.getElementById(`in-${t.id}-unit`).value;
  } else if(t.kind==='num'){
    o.vVal = document.getElementById(`in-${t.id}-val`).value;
  } else if(t.kind==='frac'){
    o.vZ = document.getElementById(`in-${t.id}-z`).value;
    o.vN = document.getElementById(`in-${t.id}-n`).value;
  }
  return o;
}

function evalTask(t, vals){
  if(t.kind==='num+unit'){
    const tol = t.tol||1e-9;
    const numOk = !isNaN(parseFloat(normNum(vals.vVal))) && Math.abs(parseFloat(normNum(vals.vVal)) - t.val) < tol;
    const unitOk = unitEq(vals.vUnit, t.unit);
    return {correct: numOk && unitOk, numOk, unitOk};
  }
  if(t.kind==='num'){
    const tol = t.tol||1e-9;
    const numOk = !isNaN(parseFloat(normNum(vals.vVal))) && Math.abs(parseFloat(normNum(vals.vVal)) - t.val) < tol;
    return {correct:numOk, numOk};
  }
  if(t.kind==='frac'){
    const z = parseInt(normNum(vals.vZ),10), n = parseInt(normNum(vals.vN),10);
    if(isNaN(z)||isNaN(n)||n===0) return {correct:false};
    // gekürzt verlangt: Wert gleich UND gekürzt
    const valOk = Math.abs(z/n - t.fz/t.fn) < 1e-9;
    const reduced = isReduced(z,n);
    return {correct: valOk && reduced, valOk, reduced};
  }
}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a;}
function isReduced(z,n){return gcd(z,n)===1;}

function checkTask(cardId, lv, taskId){
  const card = getCard(cardId);
  const t = card.levels[lv].find(x=>x.id===taskId);
  const vals = readInputs(t);
  const res = evalTask(t, vals);

  const st = ensure(cardId, lv);
  st[taskId] = Object.assign(st[taskId]||{}, vals, {checked:true, correct:res.correct});

  applyFeedback(cardId, lv, taskId, res.correct, false, res);
  updateProgress();
}

function applyFeedback(cardId, lv, taskId, correct, restore, res){
  const card = getCard(cardId);
  const t = card.levels[lv].find(x=>x.id===taskId);
  const fb = document.getElementById('fb-'+taskId);
  const clr = document.getElementById('clr-'+taskId);

  // Input-Styles
  const ids = t.kind==='frac' ? [`in-${taskId}-z`,`in-${taskId}-n`]
            : t.kind==='num+unit' ? [`in-${taskId}-val`,`in-${taskId}-unit`]
            : [`in-${taskId}-val`];

  if(correct){
    ids.forEach(id=>{const e=document.getElementById(id); if(e){e.classList.remove('bad');e.classList.add('ok');e.readOnly=true;}});
    fb.className='fb correct show';
    fb.innerHTML = '✅ Richtig! Sehr gut.';
    if(clr) clr.style.display='none';
  } else {
    ids.forEach(id=>{const e=document.getElementById(id); if(e){e.classList.remove('ok');e.classList.add('bad');}});
    fb.className='fb wrong show';
    let solHtml='';
    if(t.kind==='num+unit') solHtml = `Richtige Antwort: <b>${fmtNum(t.val)} ${t.unitLabel}</b>`;
    else if(t.kind==='num') solHtml = `Richtige Antwort: <b>${fmtNum(t.val)}</b>`;
    else if(t.kind==='frac') solHtml = `Richtige Antwort: ${frac(t.fz,t.fn)} (gekürzt)`;
    fb.innerHTML = '❌ Noch nicht richtig.<span class="sol">'+solHtml+'</span>';
    if(clr) clr.style.display='inline-block';
    // gestufte Tipps anbieten (bei jeder prüfbaren Form, da Sachaufgaben)
    const ts = document.getElementById('tips-'+taskId);
    buildTips(t, ts);
    const tb = ts.querySelector('#tipbtn-'+taskId);
    if(tb){tb.dataset.card=cardId; tb.dataset.lv=lv;}
    if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([fb]).catch(()=>{});
  }
}

function fmtNum(v){
  // schöne deutsche Schreibweise mit Komma
  let s = (Math.round(v*1000)/1000).toString();
  return s.replace('.', ',');
}

function clearTask(cardId, lv, taskId){
  const card = getCard(cardId);
  const t = card.levels[lv].find(x=>x.id===taskId);
  const st = ensure(cardId, lv);
  // nur diese Eingabe leeren – Tipps bleiben erhalten
  const tipsShown = st[taskId]?st[taskId].tipsShown:0;
  st[taskId] = {tipsShown:tipsShown};

  const ids = t.kind==='frac' ? [`in-${taskId}-z`,`in-${taskId}-n`]
            : t.kind==='num+unit' ? [`in-${taskId}-val`,`in-${taskId}-unit`]
            : [`in-${taskId}-val`];
  ids.forEach(id=>{const e=document.getElementById(id); if(e){e.value='';e.classList.remove('ok','bad');e.readOnly=false;}});
  document.getElementById('fb-'+taskId).className='fb';
  document.getElementById('clr-'+taskId).style.display='none';
  updateProgress();
}

/* =========================================================
   FORTSCHRITT & WEITER
   Karte gilt als "fertig", wenn in IRGENDEINER bearbeiteten Stufe
   alle Aufgaben dieser Stufe RICHTIG sind. Es genügt, EINE Stufe
   komplett richtig zu lösen (Schüler wählt sein Niveau selbst).
   ========================================================= */
function cardDone(card){
  return LEVELS.some(lv=>{
    const tasks = card.levels[lv];
    if(!tasks||tasks.length===0) return false;
    const st = STATE[card.id] && STATE[card.id][lv];
    if(!st) return false;
    return tasks.every(t=> st[t.id] && st[t.id].checked && st[t.id].correct);
  });
}

function updateProgress(){
  let doneCount=0;
  CARDS.forEach(card=>{
    const done = cardDone(card);
    const tab = document.getElementById('tab-'+card.id);
    if(done){tab.classList.add('done'); doneCount++;}
    else tab.classList.remove('done');
  });
  const total = CARDS.length;
  const note = document.getElementById('progressNote');
  const ww = document.getElementById('weiterWrap');
  if(doneCount>=total){
    ww.classList.add('show');
    note.textContent = '🎉 Alle Karten gelöst! Du kannst weiter.';
  } else {
    ww.classList.remove('show');
    note.textContent = `Fortschritt: ${doneCount} von ${total} Karten gelöst. Löse jede Karte in einer Niveaustufe vollständig, dann erscheint der „Weiter"-Button.`;
  }
}

/* =========================================================
   NAVIGATION
   ========================================================= */
function showCard(cardId){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('show'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('card-'+cardId).classList.add('show');
  document.getElementById('tab-'+cardId).classList.add('active');
  // Beim erneuten Anzeigen: Ansicht aus Zustand neu befüllen (nicht leeren!)
  renderTasks(cardId, CUR_LEVEL[cardId]);
  window.scrollTo({top:0, behavior:'smooth'});
}

/* T-Rex */
const trex = document.getElementById('trex');
trex.addEventListener('click', ()=>trex.classList.toggle('open'));

/* init */
showCard('c1');
updateProgress();
</script>
