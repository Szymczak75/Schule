function frac(z,n){ return '<span class="frac"><span>'+z+'</span><span>'+n+'</span></span>'; }

      {type:'num', q:frac(9,20)+' + 0,37 =', answers:['0,82'],
        hint1:'Erweitere den Bruch auf Hundertstel (Nenner 100).',
        sol:frac(9,20)+' = '+frac(45,100)+' = 0,45 → 0,45 + 0,37 = <strong>0,82</strong>'}
    ],
    profi:[
      {type:'num', q:'1'+frac(3,4)+' + 0,85 =', answers:['2,6'],

        hint1:'1 km = 1 000 000 mm → Komma 6 Stellen nach rechts.', sol:'3,2 km = <strong>3 200 000 mm</strong>'},

const EX_WDH = {
  id:'wdh', tab:'Wiederholung', title:'Wiederholung: Brüche kürzen &amp; erweitern',
  desc:'Vorwissen, das du für die Bruchrechnung (Übung 3) brauchst.',
  hasLevels:true, defaultLevel:'fort',
  levels:{
    grund:[
      {type:'fracExact', q:'Kürze so weit wie möglich: '+frac(6,8)+' =', z:3, n:4,
        hint1:'Suche den größten gemeinsamen Teiler ('+term('ggT','größter gemeinsamer Teiler – die größte Zahl, durch die beide Zahlen ohne Rest teilbar sind.')+') von 6 und 8.',

      {type:'fracExact', q:'Kürze so weit wie möglich: '+frac(4,10)+' =', z:2, n:5,

        sol:'ggT(4,10)=2 → '+frac(4,10)+' = <strong>'+frac(2,5)+'</strong>'}
    ],

        hint1:'Mit welcher Zahl musst du 3 multiplizieren, um 12 zu erhalten? Multipliziere den Zähler mit derselben Zahl.',

        hint1:'Der ggT ist hier größer als 2 – probiere 4, dann weiter.',
        sol:'ggT(36,48)=12 → '+frac(36,48)+' = <strong>'+frac(3,4)+'</strong>'},
      {type:'num', q:'Erweitere '+frac(7,9)+' auf den Nenner 63. Zähler = ?', answers:['49'],
        hint1:'Mit welcher Zahl musst du 9 multiplizieren, um 63 zu erhalten?',
        sol:'63 : 9 = 7 → 7 · 7 = <strong>49</strong> → '+frac(49,63)}

const ALL_EX = [EX_UE1, EX_UE2, EX_UE3, EX_UE4, EX_UE5, EX_UE6, EX_WDH];
const LEVEL_LABEL = {grund:'Grundlagen', fort:'Fortgeschritten', profi:'Profi', none:''};
window.ALL_EX = ALL_EX; // Debug-Zugriff (kein Einfluss auf Funktion/Datenschutz)

/* ========================= Zustand (nur JS-Speicher) ========================= */
const currentLevel = {};
const solved = {};
ALL_EX.forEach(ex=>{
  currentLevel[ex.id] = ex.defaultLevel;
  solved[ex.id] = {};
  Object.keys(ex.levels).forEach(lv=>{ solved[ex.id][lv] = ex.levels[lv].map(()=>false); });
});
window.solved = solved; window.currentLevel = currentLevel;

/* ========================= Rendering ========================= */
function taskHTML(ex, lv, idx, t){
  const uid = ex.id+'_'+lv+'_'+idx;
  let inner = '';
  const subLine = t.sub ? '<div class="localscore" style="margin-bottom:8px;">'+t.sub+'</div>' : '';
  const labelLine = t.label ? '<div style="font-weight:800;margin-bottom:6px;">'+t.label+(t.q?' – <span style="font-family:monospace;font-size:1.2rem;">'+t.q+'</span>':'')+'</div>' : '';

  if(t.type==='num'){
    inner = (t.label? labelLine : '<div class="qline">'+t.q+' <span class="eq"></span></div>') +
      '<div class="inrow">'+
      '<input class="ans" id="'+uid+'_inp" type="text" inputmode="decimal" placeholder="Antwort">'+
      '<button class="btn btn-check" onclick="checkTask(\''+ex.id+'\',\''+lv+'\','+idx+')">Prüfen</button>'+
      '<button class="btn btn-clear" id="'+uid+'_clear" onclick="clearTask(\''+ex.id+'\',\''+lv+'\','+idx+')">Leeren</button>'+
      '</div>';
  } else if(t.type==='fracEq' || t.type==='fracExact'){
    inner = '<div class="qline">'+t.q+'</div>'+
      '<div class="inrow">'+
      '<div class="fracinputs"><input class="ans frac-ans" id="'+uid+'_z" type="text" placeholder="?"><div class="fracdiv"></div><input class="ans frac-ans" id="'+uid+'_n" type="text" placeholder="?"></div>'+
      '<button class="btn btn-check" onclick="checkTask(\''+ex.id+'\',\''+lv+'\','+idx+')">Prüfen</button>'+
      '<button class="btn btn-clear" id="'+uid+'_clear" onclick="clearTask(\''+ex.id+'\',\''+lv+'\','+idx+')">Leeren</button>'+
      '</div>';
  } else if(t.type==='cmp'){
    inner = subLine + '<div class="qline">'+t.q+'</div>'+
      '<div class="cmpbtns" id="'+uid+'_grp">'+
      ['<','=','>'].map(s=>'<button class="cmpbtn" onclick="selectCmp(\''+ex.id+'\',\''+lv+'\','+idx+',\''+s+'\')">'+s+'</button>').join('')+
      '</div>'+
      '<div class="inrow"><button class="btn btn-check" onclick="checkTask(\''+ex.id+'\',\''+lv+'\','+idx+')">Prüfen</button></div>';
  } else if(t.type==='unit'){
    inner = '<div class="qline">'+t.q+'</div>'+
      '<div class="inrow">'+
      '<input class="ans" id="'+uid+'_inp" type="text" inputmode="decimal" placeholder="Zahl">'+
      '<select class="unitsel" id="'+uid+'_unit"><option value="">Einheit wählen</option>'+
        t.options.map(o=>'<option value="'+o+'">'+o+'</option>').join('')+
      '</select>'+
      '<button class="btn btn-check" onclick="checkTask(\''+ex.id+'\',\''+lv+'\','+idx+')">Prüfen</button>'+
      '<button class="btn btn-clear" id="'+uid+'_clear" onclick="clearTask(\''+ex.id+'\',\''+lv+'\','+idx+')">Leeren</button>'+
      '</div>';
  }

  return '<div class="task" id="'+uid+'_task">'+
    inner+
    '<div class="feedback" id="'+uid+'_fb"></div>'+
    '<div class="hintbox">'+
      '<button class="hint-btn" id="'+uid+'_hbtn" onclick="showHint(\''+ex.id+'\',\''+lv+'\','+idx+')">💡 Tipp anzeigen</button>'+
      '<div class="hint-text" id="'+uid+'_htext"></div>'+
    '</div>'+
  '</div>';
}

function renderCard(ex){
  let html = '<div class="card">'+
    '<h2>'+ex.title+'</h2>'+
    '<div class="desc">'+ex.desc+'</div>'+
    '<div class="localscore" id="'+ex.id+'_score"></div>';

  if(ex.hasLevels){
    html += '<div class="levels">'+
      Object.keys(ex.levels).map(lv=>'<button class="levelbtn" id="'+ex.id+'_lvbtn_'+lv+'" onclick="selectLevel(\''+ex.id+'\',\''+lv+'\')">'+LEVEL_LABEL[lv]+'</button>').join('')+
      '</div>';
  }

  Object.keys(ex.levels).forEach(lv=>{
    html += '<div class="levelpanel" id="'+ex.id+'_panel_'+lv+'">'+
      ex.levels[lv].map((t,idx)=>taskHTML(ex,lv,idx,t)).join('')+
      '</div>';
  });

  html += '</div>';
  return html;
}

function renderAll(){
  const tabbar = document.getElementById('tabbar');
  const root = document.getElementById('cardsRoot');
  let tabHtml = '';
  let rootHtml = '';

  ALL_EX.forEach(ex=>{
    tabHtml += '<button class="tabbtn" id="tab_'+ex.id+'" onclick="showCard(\''+ex.id+'\')">'+ex.tab+'</button>';
    rootHtml += '<div class="card-panel" id="panel_'+ex.id+'">'+renderCard(ex)+'</div>';
  });
  tabHtml += '<button class="tabbtn" id="tab_eval" onclick="showCard(\'eval\')">Auswertung</button>';
  rootHtml += '<div class="card-panel" id="panel_eval"><div class="card"><h2>Auswertung</h2><div class="desc">Dein Gesamtstand über alle Übungen (bezogen auf die aktuell gewählte Niveaustufe je Übung).</div><div class="evalbox" id="evalContent"></div></div></div>';

  tabbar.innerHTML = tabHtml;
  root.innerHTML = rootHtml;

  ALL_EX.forEach(ex=>{ selectLevel(ex.id, currentLevel[ex.id], true); });
  showCard(ALL_EX[0].id);
  updateProgress();
}

function showCard(id){
  document.querySelectorAll('.card-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel_'+id).classList.add('active');
  document.getElementById('tab_'+id).classList.add('active');
  if(id==='eval') renderEval();
}

function selectLevel(exId, lv, silent){
  currentLevel[exId] = lv;
  const ex = ALL_EX.find(e=>e.id===exId);
  Object.keys(ex.levels).forEach(k=>{
    const panel = document.getElementById(exId+'_panel_'+k);
    if(panel) panel.classList.toggle('active', k===lv);
    const btn = document.getElementById(exId+'_lvbtn_'+k);
    if(btn) btn.classList.toggle('active', k===lv);
  });
  updateLocalScore(exId);
  if(!silent) updateProgress();
}

/* ========================= Prüfen-Logik ========================= */
function checkTask(exId, lv, idx){
  const ex = ALL_EX.find(e=>e.id===exId);
  const t = ex.levels[lv][idx];
  if(solved[exId][lv][idx]) return;
  const uid = exId+'_'+lv+'_'+idx;
  const fb = document.getElementById(uid+'_fb');
  let ok = false;

  if(t.type==='num'){
    const inp = document.getElementById(uid+'_inp');
    const val = normNum(inp.value);
    ok = t.answers.map(normNum).includes(val);
    markInputs([inp], ok);
    fb.textContent = ok ? '✅ Richtig! Sehr gut!' : '❌ Leider noch nicht richtig.';
  } else if(t.type==='fracEq'){
    const z = parseInt(document.getElementById(uid+'_z').value);
    const n = parseInt(document.getElementById(uid+'_n').value);
    ok = !isNaN(z) && !isNaN(n) && n!==0 && z*t.n === t.z*n;
    markInputs([document.getElementById(uid+'_z'),document.getElementById(uid+'_n')], ok);
    fb.textContent = ok ? '✅ Richtig! Klasse!' : '❌ Nicht ganz – auch ein erweiterter Bruch wäre okay gewesen.';
  } else if(t.type==='fracExact'){
    const z = parseInt(document.getElementById(uid+'_z').value);
    const n = parseInt(document.getElementById(uid+'_n').value);
    ok = z===t.z && n===t.n;
    markInputs([document.getElementById(uid+'_z'),document.getElementById(uid+'_n')], ok);
    fb.textContent = ok ? '✅ Richtig, vollständig gekürzt!' : '❌ Noch nicht vollständig gekürzt oder falsch.';
  } else if(t.type==='cmp'){
    const sel = uid+'_selected';
    const chosen = window[sel];
    if(!chosen){ fb.textContent = '⚠️ Bitte wähle zuerst ein Zeichen aus!'; fb.className='feedback wrong'; return; }
    ok = chosen === t.sign;
    document.querySelectorAll('#'+uid+'_grp .cmpbtn').forEach(b=>{
      b.classList.remove('correct','wrong');
      if(ok && b.textContent===t.sign) b.classList.add('correct');
      if(!ok && b.textContent===chosen) b.classList.add('wrong');
    });
    fb.textContent = ok ? '✅ Richtig!' : '❌ Falsch – schau dir den Tipp an.';
  } else if(t.type==='unit'){
    const inp = document.getElementById(uid+'_inp');
    const sel = document.getElementById(uid+'_unit');
    const numOk = t.answers.map(normNum).includes(normNum(inp.value));
    const unitChosen = sel.value;
    const unitOk = unitChosen === t.correctUnit;
    ok = numOk && unitOk;
    markInputs([inp], numOk);
    sel.style.borderColor = unitChosen==='' ? '#e0e0e0' : (unitOk ? 'var(--green)' : 'var(--red)');
    if(unitChosen===''){ fb.textContent = '⚠️ Bitte wähle noch eine Einheit aus.'; fb.className='feedback wrong'; showClear(uid); showHint(exId,lv,idx); return; }
    if(numOk && unitOk) fb.textContent = '✅ Richtig! Zahl und Einheit stimmen.';
    else if(numOk && !unitOk) fb.textContent = '❌ Die Zahl stimmt, aber die Einheit ist falsch.';
    else if(!numOk && unitOk) fb.textContent = '❌ Die Einheit stimmt, aber die Zahl ist falsch.';
    else fb.textContent = '❌ Zahl und Einheit sind beide falsch.';
  }

  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');

  if(ok){
    solved[exId][lv][idx] = true;
    document.getElementById(uid+'_hbtn').style.display='none';
    hideClear(uid);
  } else {
    showClear(uid);
    showHint(exId, lv, idx);
  }
  updateLocalScore(exId);
  updateProgress();
}

function markInputs(inputs, ok){
  inputs.forEach(inp=>{ if(inp){ inp.classList.remove('correct','wrong'); inp.classList.add(ok?'correct':'wrong'); } });
}
function showClear(uid){ const c=document.getElementById(uid+'_clear'); if(c) c.classList.add('show'); }
function hideClear(uid){ const c=document.getElementById(uid+'_clear'); if(c) c.classList.remove('show'); }

function clearTask(exId, lv, idx){
  const uid = exId+'_'+lv+'_'+idx;
  const inp = document.getElementById(uid+'_inp');
  if(inp){ inp.value=''; inp.classList.remove('correct','wrong'); }
  const z = document.getElementById(uid+'_z'); if(z){ z.value=''; z.classList.remove('correct','wrong'); }
  const n = document.getElementById(uid+'_n'); if(n){ n.value=''; n.classList.remove('correct','wrong'); }
  const sel = document.getElementById(uid+'_unit'); if(sel){ sel.value=''; sel.style.borderColor='#e0e0e0'; }
  document.getElementById(uid+'_fb').textContent='';
  hideClear(uid);
}

function selectCmp(exId, lv, idx, sym){
  const uid = exId+'_'+lv+'_'+idx;
  if(solved[exId][lv][idx]) return;
  window[uid+'_selected'] = sym;
  document.querySelectorAll('#'+uid+'_grp .cmpbtn').forEach(b=>{
    b.classList.remove('selected','correct','wrong');
    if(b.textContent===sym) b.classList.add('selected');
  });
}

function showHint(exId, lv, idx){
  const ex = ALL_EX.find(e=>e.id===exId);
  const t = ex.levels[lv][idx];
  const uid = exId+'_'+lv+'_'+idx;
  const box = document.getElementById(uid+'_htext');
  const btn = document.getElementById(uid+'_hbtn');
  const stage = box.dataset.stage || '0';
  if(stage==='0'){
    box.innerHTML = '💡 <b>Tipp:</b> '+t.hint1;
    box.classList.add('show');
    box.dataset.stage='1';
    btn.textContent = '📖 Musterlösung anzeigen';
  } else {
    box.innerHTML = '💡 <b>Tipp:</b> '+t.hint1+'<br><br>📖 <b>Musterlösung:</b> '+t.sol;
    box.dataset.stage='2';
    btn.style.display='none';
  }
}

/* ========================= Fortschritt & Auswertung ========================= */
function updateLocalScore(exId){
  const ex = ALL_EX.find(e=>e.id===exId);
  const lv = currentLevel[exId];
  const total = ex.levels[lv].length;
  const done = solved[exId][lv].filter(Boolean).length;
  const el = document.getElementById(exId+'_score');
  if(el) el.textContent = 'Punkte: '+done+' / '+total;
}

function updateProgress(){
  let total=0, done=0;
  ALL_EX.forEach(ex=>{
    const lv = currentLevel[ex.id];
    total += ex.levels[lv].length;
    done += solved[ex.id][lv].filter(Boolean).length;
  });
  document.getElementById('gpText').textContent = done+'/'+total;
  document.getElementById('gpFill').style.width = (total?(done/total*100):0)+'%';
  const weiter = document.getElementById('weiterbar');
  weiter.classList.toggle('show', total>0 && done===total);
}

function renderEval(){
  const cont = document.getElementById('evalContent');
  let rows = '';
  let total=0, done=0;
  ALL_EX.forEach(ex=>{
    const lv = currentLevel[ex.id];
    const t = ex.levels[lv].length;
    const d = solved[ex.id][lv].filter(Boolean).length;
    total+=t; done+=d;
    rows += '<div class="evalrow"><span>'+ex.tab+' ('+LEVEL_LABEL[lv]+')</span><span>'+d+' / '+t+'</span></div>';
  });
  rows += '<div class="evaltotal">'+(done===total ? '🎉 Alles geschafft: ' : 'Gesamtstand: ')+done+' / '+total+'</div>';
  cont.innerHTML = rows;
}

renderAll();
</script>
