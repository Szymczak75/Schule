   Keine Neu-Initialisierung beim Tab-Wechsel – nur ein-/ausblenden.
   ========================================================================= */

const STATE = {};      // itemId -> {value, unit, status:'offen'|'ok'|'no', tippLevel:0}
const ITEMS = {};      // itemId -> Aufgaben-Definition (für Prüfung)
let cardCount = 0;
const CARD_ITEMS = {}; // cardIndex -> [itemId,...]

/* ---------- Bruch-Helfer ---------- */
function frac(z,n){return `<span class="frac"><span>${z}</span><span>${n}</span></span>`;}
function gem(g,z,n){return `<span class="gemischt">${g}&nbsp;${frac(z,n)}</span>`;}

/* ---------- Normalisierung Texteingabe ---------- */
function normNum(s){
  let t=(s||'').toString().trim().replace(/\s+/g,'').toLowerCase();
  // erst Auslassungspunkte/Ellipse weg, BEVOR . zu , wird
  t=t.replace(/…/g,'').replace(/\.\.\.+/g,'');
  t=t.replace(/\./g,',');                        // Dezimalpunkt -> Komma
  // Überstrich-Variante (Ziffer + U+0305) -> in Klammer umwandeln
  t=t.replace(/(\d)\u0305/g,'($1)');
  // mehrfach wiederholte Endziffern (z.B. 6,666) -> 6,(6)
  t=t.replace(/,(\d*?)(\d)\2{2,}$/,',$1($2)');
  return t;
}
// Bruch-Eingabe: akzeptiert "3/4", "3 / 4", "0,75"? -> wir prüfen exakt nach Spezifikation
function normFrac(s){
  return (s||'').toString().trim().replace(/\s+/g,'').replace(/[:÷]/g,'/');
}

     answerNum:["1,6"], answerUnit:"l",
     units:["l","ml","l²","cm"],
     tipps:[`Wasser = Gesamt − Saft.`,`\\(4\\,l - 2{,}4\\,l\\).`,`\\(4-2{,}4=1{,}6\\) → \\(1{,}6\\,l\\).`]},
    {id:"6c", typ:"unit", html:`c) &nbsp; Peter will einen Saftanteil von \\(80\\,\\%\\) und hat \\(2{,}4\\,l\\) Saft. Wie viel Liter Wasser muss er zugeben?`,
     answerNum:["0,6"], answerUnit:"l",
     units:["l","ml","l²","cm"],
     tipps:[`Erst die Gesamtmenge: Saft : 0,8.`,`\\(2{,}4 : 0{,}8 = 3\\,l\\) gesamt. Wasser = Gesamt − Saft.`,`\\(3\\,l - 2{,}4\\,l = 0{,}6\\,l\\).`]}
  ]
 }
];

/* =========================================================================
   AUFBAU DER SEITE
   ========================================================================= */
const tabsEl=document.getElementById('tabs');
const mainEl=document.getElementById('main');
cardCount=KARTEN.length;

KARTEN.forEach((k,ci)=>{
  CARD_ITEMS[ci]=[];
  // Tab
  const t=document.createElement('button');
  t.className='tab'+(ci===0?' aktiv':'');
  t.id='tab-'+ci;
  t.innerHTML=k.tab;
  t.addEventListener('click',()=>zeigeKarte(ci));
  tabsEl.appendChild(t);

  // Karte
  const c=document.createElement('section');
  c.className='karte'+(ci===0?' aktiv':'');
  c.id='karte-'+ci;

  let html=`<div class="block">
    <div class="eyebrow">${k.eyebrow}</div>
    <h2>${k.titel}</h2>
    <div class="rueck"><h3>${k.rueckTitel}</h3>${k.rueckHtml}</div>`;

  html+=`<p class="hinweis">Jetzt bist du dran – rechne die folgenden Aufgaben und prüfe sie einzeln.</p>`;

  k.items.forEach(it=>{
    ITEMS[it.id]=it;
    CARD_ITEMS[ci].push(it.id);
    STATE[it.id]={value:'',unit:'',status:'offen',tippLevel:0};
    html+=baueItem(it);
  });

  html+=`</div>`;
  c.innerHTML=html;
  mainEl.appendChild(c);
});

function baueItem(it){
  let eingabe='';
  if(it.typ==='unit'){
    let opts=it.units.map(u=>`<option value="${u}">${u}</option>`).join('');
    eingabe=`<div class="zeile">
        <input type="text" inputmode="decimal" id="in-${it.id}" placeholder="Zahl" autocomplete="off">
        <select id="un-${it.id}"><option value="">Einheit…</option>${opts}</select>
      </div>`;
  } else {
    const im = it.typ==='num' ? 'decimal' : 'text';
    eingabe=`<div class="zeile">
        <input type="text" inputmode="${im}" class="wide" id="in-${it.id}" placeholder="${it.placeholder||'Ergebnis'}" autocomplete="off">
      </div>`;
  }

  let tippHtml='';
  if(it.tipps && it.tipps.length){
    tippHtml=`<div class="tippbox" id="tb-${it.id}">`;
    it.tipps.forEach((tp,i)=>{
      tippHtml+=`<div class="tippstep" id="ts-${it.id}-${i}"><span class="label">Tipp ${i+1}${i===it.tipps.length-1?' (Lösung)':''}:</span> ${tp}</div>`;
    });
    tippHtml+=`</div>`;
  }

  return `<div class="aufg" id="aufg-${it.id}">
    <div class="frage">${it.html}</div>
    ${eingabe}
    <div class="btn-row">
      <button class="btn btn-pruefen" id="pr-${it.id}">Prüfen</button>
      <button class="btn btn-leeren" id="cl-${it.id}" style="display:none">Leeren</button>
      ${it.tipps&&it.tipps.length?`<button class="btn btn-tipp" id="tp-${it.id}" style="display:none">Tipp anzeigen</button>`:''}
    </div>
    <div class="fb" id="fb-${it.id}"></div>
    ${tippHtml}
  </div>`;
}

/* =========================================================================
   EVENTS
   ========================================================================= */
Object.keys(ITEMS).forEach(id=>{
  const it=ITEMS[id];
  document.getElementById('pr-'+id).addEventListener('click',()=>pruefe(id));
  document.getElementById('cl-'+id).addEventListener('click',()=>leeren(id));
  if(it.tipps&&it.tipps.length){
    document.getElementById('tp-'+id).addEventListener('click',()=>naechsterTipp(id));
  }
  const inp=document.getElementById('in-'+id);
  inp.addEventListener('input',()=>{STATE[id].value=inp.value;});
  if(it.typ==='unit'){
    const sel=document.getElementById('un-'+id);
    sel.addEventListener('change',()=>{STATE[id].unit=sel.value;});
  }
});

/* =========================================================================
   PRÜFEN
   ========================================================================= */
function pruefe(id){
  const it=ITEMS[id];
  const st=STATE[id];
  const inp=document.getElementById('in-'+id);
  const fb=document.getElementById('fb-'+id);
  const val=inp.value;
  st.value=val;

  let richtig=false, einheitFalsch=false, zahlFalsch=false, keineEinheit=false;

  if(it.typ==='unit'){
    const sel=document.getElementById('un-'+id);
    const u=sel.value; st.unit=u;
    const zahlOk = it.answerNum.map(normNum).includes(normNum(val));
    if(!u){keineEinheit=true;}
    const einheitOk = (u===it.answerUnit);
    richtig = zahlOk && einheitOk;
    zahlFalsch = !zahlOk;
    einheitFalsch = !einheitOk && !keineEinheit;
  } else if(it.typ==='frac'){
    const norm=normFrac(val).replace(',','.');
    richtig = it.answers.map(a=>normFrac(a)).includes(normFrac(val));
  } else { // num
    richtig = it.answers.map(normNum).includes(normNum(val));
  }

  if(richtig){
    st.status='ok';
    fb.className='fb ok';
    fb.innerHTML='✅ Richtig! Stark gemacht.';
    inp.disabled=true;
    const sel=document.getElementById('un-'+id); if(sel) sel.disabled=true;
    document.getElementById('pr-'+id).style.display='none';
    document.getElementById('cl-'+id).style.display='none';
    const tp=document.getElementById('tp-'+id); if(tp) tp.style.display='none';
  } else {
    st.status='no';
    fb.className='fb no';
    let msg='❌ Noch nicht richtig.';
    if(it.typ==='unit'){
      if(keineEinheit){ msg='❌ Bitte wähle auch eine Einheit im Dropdown aus.'; }
      else if(!zahlFalsch && einheitFalsch){ msg='❌ Die Zahl stimmt, aber die Einheit passt nicht. Achte auf Liter (l).'; }
      else if(zahlFalsch && !einheitFalsch){ msg='❌ Die Einheit passt, aber die Zahl stimmt noch nicht.'; }
      else { msg='❌ Zahl und Einheit stimmen noch nicht.'; }
    }
    fb.innerHTML=msg;
    document.getElementById('cl-'+id).style.display='inline-flex';
    const tp=document.getElementById('tp-'+id); if(tp) tp.style.display='inline-flex';
  }
  aktualisiereFortschritt();
  if(window.MathJax&&MathJax.typesetPromise){MathJax.typesetPromise([fb]);}
}

/* =========================================================================
   LEEREN (einziges absichtliches Zurücksetzen)
   ========================================================================= */
function leeren(id){
  const it=ITEMS[id];
  const st=STATE[id];
  st.value=''; st.unit=''; st.status='offen';
  const inp=document.getElementById('in-'+id);
  inp.value=''; inp.disabled=false;
  if(it.typ==='unit'){const sel=document.getElementById('un-'+id); sel.value=''; sel.disabled=false;}
  const fb=document.getElementById('fb-'+id); fb.className='fb'; fb.innerHTML='';
  document.getElementById('cl-'+id).style.display='none';
  document.getElementById('pr-'+id).style.display='inline-flex';
  aktualisiereFortschritt();
}

/* =========================================================================
   GESTUFTE TIPPS
   ========================================================================= */
function naechsterTipp(id){
  const it=ITEMS[id];
  const st=STATE[id];
  if(st.tippLevel<it.tipps.length){
    const step=document.getElementById(`ts-${id}-${st.tippLevel}`);
    document.getElementById('tb-'+id).classList.add('an');
    step.classList.add('an');
    if(window.MathJax&&MathJax.typesetPromise){MathJax.typesetPromise([step]);}
    st.tippLevel++;
  }
  if(st.tippLevel>=it.tipps.length){
    document.getElementById('tp-'+id).textContent='Alle Tipps gezeigt';
    document.getElementById('tp-'+id).disabled=true;
  } else {
    document.getElementById('tp-'+id).textContent='Nächster Tipp';
  }
}

/* =========================================================================
   TAB-WECHSEL (nur ein-/ausblenden, kein Reset)
   ========================================================================= */
function zeigeKarte(ci){
  KARTEN.forEach((_,i)=>{
    document.getElementById('karte-'+i).classList.toggle('aktiv',i===ci);
    document.getElementById('tab-'+i).classList.toggle('aktiv',i===ci);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

/* =========================================================================
   FORTSCHRITT & WEITER-BUTTON
   ========================================================================= */
function aktualisiereFortschritt(){
  let alleOk=true;
  KARTEN.forEach((_,ci)=>{
    const ids=CARD_ITEMS[ci];
    const fertig=ids.every(id=>STATE[id].status==='ok');
    document.getElementById('tab-'+ci).classList.toggle('fertig',fertig);
    if(!fertig) alleOk=false;
  });
  document.getElementById('weiterWrap').classList.toggle('an',alleOk);
}

document.getElementById('weiterBtn').addEventListener('click',()=>{
  window.location.href='#';
});

/* =========================================================================
   DINO
   ========================================================================= */
const dino=document.getElementById('dino');
const bubble=document.getElementById('dinoBubble');
function toggleBubble(){bubble.classList.toggle('an');setTimeout(()=>bubble.classList.remove('an'),1800);}
dino.addEventListener('click',toggleBubble);
dino.addEventListener('mouseenter',()=>bubble.classList.add('an'));
dino.addEventListener('mouseleave',()=>bubble.classList.remove('an'));

/* MathJax initial */
window.addEventListener('load',()=>{
  if(window.MathJax&&MathJax.typesetPromise){MathJax.typesetPromise();}
});
</script>
