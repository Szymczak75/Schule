<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Interaktive Übung zu Grundbegriffen der Geometrie: Strecke, Gerade, Strahl, parallele und senkrechte Geraden sowie besondere Dreiecke und Vierecke.">
<meta name="keywords" content="Geometrie, Strecke, Gerade, Strahl, parallel, senkrecht, Dreieck, Viereck">
<meta name="typ" content="Übung">
<meta name="klasse" content="5">
<meta name="fach" content="mathe">
<meta name="oberthema" content="Geometrie">
<meta name="thema" content="Grundbegriffe und Figuren">
<title>Übung – Grundbegriffe der Geometrie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --kopf:#2f5fa6;
  --kopf2:#1f4680;
  --bg:#f6f8fb;
  --karte:#ffffff;
  --rand:#dbe3ee;
  --text:#22303f;
  --grau:#6b7686;
  --gruen:#1e7d32;
  --gruen-bg:#1e7d32;
  --rot:#c1272d;
  --rot-bg:#c1272d;
  --akzent:#1f4680;
  --schatten:0 4px 16px rgba(31,70,128,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  background-image:radial-gradient(circle at 12% 8%,#e6eefb 0,transparent 40%),radial-gradient(circle at 88% 92%,#e6eefb 0,transparent 42%);
  color:var(--text);
  font-size:17px;
  line-height:1.5;
  padding:0 0 90px 0;
  min-height:100vh;
}
h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;}
.kopf{
  background:linear-gradient(120deg,var(--kopf),var(--kopf2));
  color:#fff;
  padding:18px 20px 16px;
  box-shadow:0 2px 14px rgba(31,70,128,.25);
}
.kopf h1{margin:0;font-size:1.5rem;letter-spacing:.3px;}
.kopf p{margin:4px 0 0;font-size:.95rem;opacity:.92;font-weight:600;}
.badge{display:inline-block;background:rgba(255,255,255,.22);border-radius:20px;padding:2px 12px;font-size:.8rem;font-weight:700;margin-top:8px;}

.tabs{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:12px 14px;position:sticky;top:0;z-index:30;
  background:var(--bg);box-shadow:0 4px 10px -8px rgba(0,0,0,.3);
}
.tab{
  flex:1 1 auto;min-width:44px;min-height:44px;
  border:2px solid var(--rand);background:var(--karte);
  border-radius:14px;font-family:'Fredoka',sans-serif;font-weight:500;
  font-size:.92rem;color:var(--grau);cursor:pointer;
  padding:6px 8px;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.tab.done{border-color:var(--gruen);color:var(--gruen);}
.tab.aktiv{background:var(--kopf);color:#fff;border-color:var(--kopf);box-shadow:var(--schatten);}
.tab .dot{font-size:.85rem;}

.wrap{max-width:920px;margin:0 auto;padding:6px 14px;}
.karte{
  background:var(--karte);border:1px solid var(--rand);border-radius:20px;
  padding:20px 18px;margin:14px 0;box-shadow:var(--schatten);
  display:none;animation:fade .25s ease;
}
.karte.aktiv{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.karte h2{margin:0 0 4px;font-size:1.25rem;color:var(--kopf);}
.karte .unter{color:var(--grau);font-weight:600;font-size:.9rem;margin-bottom:14px;}

.aufgabe{background:#f6f8fb;border:1px solid var(--rand);border-radius:14px;padding:14px;margin:14px 0;}
.aufgabe .frage{font-weight:700;margin-bottom:10px;}

/* Niveau */
.niveau-leiste{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.niveau-btn{
  flex:1 1 30%;min-height:44px;border:2px solid var(--rand);background:#fff;
  border-radius:12px;font-weight:700;font-size:.9rem;color:var(--grau);
  cursor:pointer;padding:4px 6px;font-family:'Fredoka',sans-serif;
}
.niveau-btn.aktiv{background:var(--akzent);border-color:var(--akzent);color:#fff;}
.niveau-hinweis{font-size:.82rem;color:var(--grau);margin:-4px 0 12px;font-weight:600;}

/* Buttons */
.btn{
  min-height:44px;border:none;border-radius:14px;cursor:pointer;
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;
  padding:10px 18px;transition:transform .1s,filter .15s;
}
.btn:active{transform:scale(.97);}
.btn-pruefen{background:var(--kopf);color:#fff;}
.btn-leeren{background:#ffffff;color:var(--rot);border:2px solid var(--rot);margin-left:8px;}
.btn-tipp{background:#fdf3d9;color:#b8860b;border:2px solid #b8860b;}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center;}

/* Eingaben */
input[type=text]{
  font-family:'Nunito',sans-serif;font-size:17px;padding:10px 12px;
  border:2px solid var(--rand);border-radius:10px;width:100%;max-width:320px;
  background:#fff;color:var(--text);
}
input[type=text]:focus{outline:none;border-color:var(--kopf);}
.luecke{display:inline-block;width:90px;max-width:120px;text-align:center;margin:0 3px;}

/* MC / Wahr-Falsch / Mehrfach */
.opt{
  display:block;width:100%;text-align:left;border:2px solid var(--rand);
  background:#fff;border-radius:12px;padding:12px 14px;margin:7px 0;
  min-height:44px;cursor:pointer;font-size:1rem;font-weight:600;color:var(--text);
  font-family:'Nunito',sans-serif;transition:all .12s;
}
.opt.sel{border-color:var(--kopf);background:#e6eefb;}
.opt.correct{border-color:var(--gruen);background:var(--gruen-bg);color:#fff;}
.opt.wrong{border-color:var(--rot);background:var(--rot-bg);color:#fff;}
.tf-row{display:flex;gap:10px;}
.tf-row .opt{flex:1;text-align:center;}

/* Antippen / Zuordnen */
.pool,.ziel-row{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0;}
.chip{
  min-height:44px;border:2px solid var(--rand);background:#fff;border-radius:12px;
  padding:8px 14px;font-weight:700;cursor:pointer;display:flex;align-items:center;
  font-size:.98rem;transition:all .12s;
}
.chip.sel{border-color:var(--akzent);background:#e6eefb;transform:scale(1.04);}
.chip.platziert{background:#e6eefb;border-color:var(--kopf);}
.kat{
  border:2px dashed var(--rand);border-radius:14px;padding:10px;margin:8px 0;
  min-height:60px;background:#f6f8fb;
}
.kat.target{border-color:var(--akzent);background:#e6eefb;}
.kat h4{margin:0 0 6px;font-family:'Fredoka';color:var(--grau);font-size:.95rem;}
.kat .inhalt{display:flex;flex-wrap:wrap;gap:6px;min-height:34px;}

/* Paare */
.paare{display:flex;gap:14px;}
.paare .sp{flex:1;display:flex;flex-direction:column;gap:8px;}
.pitem{min-height:44px;border:2px solid var(--rand);background:#fff;border-radius:12px;
  padding:8px 12px;cursor:pointer;font-weight:600;font-size:.95rem;transition:all .12s;}
.pitem.sel{border-color:var(--akzent);background:#e6eefb;}
.pitem.verbunden{border-color:var(--kopf);background:#e6eefb;}
.pitem .num{display:inline-block;background:var(--kopf);color:#fff;border-radius:50%;
  width:22px;height:22px;line-height:22px;text-align:center;font-size:.8rem;margin-right:6px;}

/* Reihenfolge */
.sortliste{display:flex;flex-direction:column;gap:8px;}
.sortitem{display:flex;align-items:center;gap:8px;border:2px solid var(--rand);
  background:#fff;border-radius:12px;padding:6px 10px;font-weight:600;}
.sortitem .txt{flex:1;}
.pfeil{min-width:44px;min-height:44px;border:2px solid var(--rand);background:#f6f8fb;
  border-radius:10px;font-size:1.2rem;cursor:pointer;font-weight:700;color:var(--kopf);}

/* Feedback */
.fb{margin-top:10px;padding:10px 12px;border-radius:12px;font-weight:700;display:none;}
.fb.ok{display:block;background:var(--gruen-bg);color:#fff;}
.fb.no{display:block;background:var(--rot-bg);color:#fff;}
.fb .loesung{font-weight:600;display:block;margin-top:4px;font-size:.95rem;}

.tipp-box{margin-top:8px;display:none;}
.tipp-box.open{display:block;}
.tipp-stufe{background:#fdf3d9;border:1px solid #b8860b;border-radius:10px;
  padding:8px 12px;margin:6px 0;font-size:.95rem;display:none;}
.tipp-stufe.open{display:block;}

/* Brüche */
.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 2px;}
.frac>span{display:block;padding:0 4px;}
.frac>span:first-child{border-bottom:2px solid currentColor;}

/* Figuren / SVG */
svg{max-width:100%;height:auto;touch-action:manipulation;}
.fig-wrap{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:8px 0;}

/* Stellenwerttafel */
.swt{border-collapse:collapse;width:100%;max-width:480px;margin:8px 0;}
.swt th,.swt td{border:1px solid var(--rand);padding:6px;text-align:center;font-weight:700;}
.swt th{background:#e6eefb;font-family:'Fredoka';font-size:.85rem;}
.swt input{width:100%;max-width:60px;text-align:center;padding:6px 2px;}

/* Weiter */
.weiter-bar{position:fixed;left:0;right:0;bottom:0;padding:10px 14px;
  background:linear-gradient(0deg,var(--bg) 70%,transparent);display:none;z-index:40;}
.weiter-bar.show{display:block;}
.weiter-btn{display:block;width:100%;max-width:920px;margin:0 auto;min-height:52px;
  background:var(--gruen);color:#fff;border:none;border-radius:16px;
  font-family:'Fredoka';font-weight:600;font-size:1.15rem;cursor:pointer;box-shadow:var(--schatten);}

/* Tooltip Fachbegriff */
.fb-term{border-bottom:2px dotted var(--akzent);cursor:pointer;font-weight:700;position:relative;}
.fb-term .tip{display:none;position:absolute;left:0;bottom:130%;width:200px;
  background:#22303f;color:#fff;padding:8px 10px;border-radius:10px;font-size:.82rem;
  font-weight:600;z-index:50;box-shadow:var(--schatten);}
.fb-term.show .tip{display:block;}

/* Auswertung */
.score-big{font-family:'Fredoka';font-size:2.6rem;color:var(--kopf);text-align:center;margin:6px 0;}
.score-row{display:flex;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--rand);font-weight:700;}
.score-row .s-ok{color:var(--gruen);}
.score-row .s-no{color:var(--rot);}

/* T-Rex */
.trex{position:fixed;right:12px;bottom:74px;font-size:1.7rem;cursor:pointer;z-index:60;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));user-select:none;}
.trex .made{position:absolute;right:0;bottom:120%;white-space:nowrap;background:#22303f;
  color:#fff;padding:5px 10px;border-radius:10px;font-size:.78rem;font-weight:700;
  font-family:'Fredoka';display:none;}
.trex.show .made{display:block;}

@media(max-width:520px){
  .paare{flex-direction:column;}
  .niveau-btn{flex:1 1 100%;}
}
</style>
</head>
<body>

<header class="kopf">
  <h1>Grundbegriffe der Geometrie</h1>
  <p>Strecke · Gerade · Strahl · parallel & senkrecht · Dreiecke & Vierecke</p>
  <span class="badge">Übung · Klasse 5</span>
</header>

<nav class="tabs" id="tabs"></nav>

<div class="wrap" id="karten"></div>

<div class="weiter-bar" id="weiterBar">
  <button class="weiter-btn" onclick="document.location.href='#'">Weiter →</button>
</div>

<div class="trex" id="trex" onclick="this.classList.toggle('show')">🦖<span class="made">Made by Mathedino</span></div>

<script>
/* ============================================================
   ZUSTAND: alles im JS-Speicher. Pro Karte ein State-Objekt.
   Karten mit Niveaustufen halten Stand getrennt je Stufe.
   ============================================================ */
const State = {};      // State[kartenId] = {...}  oder  State[kartenId][stufe]
const Niveau = {};     // aktuelle Stufe je Karte mit Niveaustufen
const Done = {};       // kartenId -> true wenn fertig ausgewertet

function normalizeMul(s){
  return s.replace(/\s/g,'').replace(/\D+/g,'·').replace(/·+/g,'·').replace(/^·|·$/g,'').toLowerCase();
}

/* ---------- Kartendefinition (Reihenfolge der Tabs) ---------- */
const KARTEN = [
  {id:'k1', tab:'1 · Begriffe', title:'Strecke, Gerade oder Strahl?', niveau:false},
  {id:'k2', tab:'2 · Zuordnen', title:'Begriffe & Symbole zuordnen', niveau:false},
  {id:'k3', tab:'3 · Lage', title:'Parallel oder senkrecht?', niveau:true},
  {id:'k4', tab:'4 · Dreiecke', title:'Besondere Dreiecke', niveau:true},
  {id:'k5', tab:'5 · Vierecke', title:'Besondere Vierecke', niveau:false},
  {id:'k6', tab:'6 · Eigenschaften', title:'Eigenschaften prüfen', niveau:false},
  {id:'kw', tab:'🔁 Wdh.', title:'Wiederholung: Stellenwerte', niveau:true},
  {id:'ka', tab:'📊 Auswertung', title:'Deine Auswertung', niveau:false},
];

let aktiveKarte = 'k1';

/* zählbare (prüfbare) Karten für Weiter-Button & Auswertung */
const PRUEFBAR = ['k1','k2','k3','k4','k5','k6','kw'];
</script>

<script>
/* ============================================================
   AUFBAU DER TABS UND KARTEN-CONTAINER
   ============================================================ */
const tabsEl = document.getElementById('tabs');
const kartenEl = document.getElementById('karten');

KARTEN.forEach(k=>{
  const t = document.createElement('button');
  t.className='tab'+(k.id===aktiveKarte?' aktiv':'');
  t.id='tab_'+k.id;
  t.innerHTML='<span class="dot"></span>'+k.tab;
  t.onclick=()=>zeigeKarte(k.id);
  tabsEl.appendChild(t);

  const c=document.createElement('section');
  c.className='karte'+(k.id===aktiveKarte?' aktiv':'');
  c.id='karte_'+k.id;
  kartenEl.appendChild(c);
});

function zeigeKarte(id){
  aktiveKarte=id;
  KARTEN.forEach(k=>{
    document.getElementById('karte_'+k.id).classList.toggle('aktiv',k.id===id);
    document.getElementById('tab_'+k.id).classList.toggle('aktiv',k.id===id);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

function markDone(id){
  Done[id]=true;
  const tab=document.getElementById('tab_'+id);
  if(tab) tab.classList.add('done');
  pruefeWeiter();
  if(document.getElementById('karte_ka').classList.contains('aktiv')) renderAuswertung();
}
function pruefeWeiter(){
  const fertig=PRUEFBAR.every(id=>Done[id]);
  document.getElementById('weiterBar').classList.toggle('show',fertig);
}

function setNiveau(kid, stufe){
  Niveau[kid]=stufe;
  document.querySelectorAll('#niv_'+kid+' .niveau-btn').forEach(b=>{
    b.classList.toggle('aktiv', b.dataset.stufe===stufe);
  });
  // Ansichten nur ein-/ausblenden — NICHT neu initialisieren
  document.querySelectorAll('#wrap_'+kid+' .stufe-view').forEach(v=>{
    v.style.display = (v.dataset.stufe===stufe)?'block':'none';
  });
}

/* Hilfsfunktion: Niveauleiste bauen (Stufen die sich WIRKLICH unterscheiden) */
function niveauLeiste(kid, stufen){
  // stufen: Array von {key,label}
  let html='<div class="niveau-leiste" id="niv_'+kid+'">';
  stufen.forEach((s,i)=>{
    html+='<button class="niveau-btn'+(i===0?' aktiv':'')+'" data-stufe="'+s.key+'" onclick="setNiveau(\''+kid+'\',\''+s.key+'\')">'+s.label+'</button>';
  });
  html+='</div><div class="niveau-hinweis">Tippe oben, um die Schwierigkeit zu wechseln. Dein Stand je Stufe bleibt erhalten.</div>';
  return html;
}
</script>

<!-- ============================================================
     SVG-FIGUREN als wiederverwendbare Bausteine
     ============================================================ -->
<script>
const SVG = {
  // × als zwei SVG-Linien, die sich genau auf der Hauptlinie kreuzen
  // Hilfsmakro: kreuz(cx, cy, r) → zwei diagonale lines
  // Strecke: begrenzt an beiden Enden, kein Pfeil
  strecke:`<svg viewBox="0 0 160 44" width="160">
    <line x1="20" y1="22" x2="140" y2="22" stroke="#2f5fa6" stroke-width="4"/>
    <line x1="13" y1="15" x2="27" y2="29" stroke="#22303f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="27" y1="15" x2="13" y2="29" stroke="#22303f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="133" y1="15" x2="147" y2="29" stroke="#22303f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="147" y1="15" x2="133" y2="29" stroke="#22303f" stroke-width="2.5" stroke-linecap="round"/>
    <text x="14" y="13" font-size="12" font-weight="700" font-family="sans-serif" fill="#22303f">A</text>
    <text x="134" y="13" font-size="12" font-weight="700" font-family="sans-serif" fill="#22303f">B</text>
  </svg>`,
  // Strahl: ein × am Anfang, andere Seite endlos (bis Rand, kein Pfeil)
  strahl:`<svg viewBox="0 0 170 44" width="160">
    <line x1="20" y1="22" x2="170" y2="22" stroke="#2f5fa6" stroke-width="4"/>
    <line x1="13" y1="15" x2="27" y2="29" stroke="#22303f" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="27" y1="15" x2="13" y2="29" stroke="#22303f" stroke-width="2.5" stroke-linecap="round"/>
    <text x="14" y="13" font-size="12" font-weight="700" font-family="sans-serif" fill="#22303f">A</text>
  </svg>`,
  // Gerade: beidseitig endlos, keine Symbole
  gerade:`<svg viewBox="0 0 170 44" width="160">
    <line x1="0" y1="22" x2="170" y2="22" stroke="#2f5fa6" stroke-width="4"/>
  </svg>`,
  parallel:`<svg viewBox="0 0 160 80" width="150"><line x1="0" y1="25" x2="160" y2="25" stroke="#2f5fa6" stroke-width="4"/><line x1="0" y1="55" x2="160" y2="55" stroke="#2f5fa6" stroke-width="4"/></svg>`,
  senkrecht:`<svg viewBox="0 0 120 95" width="120"><line x1="60" y1="5" x2="60" y2="90" stroke="#2f5fa6" stroke-width="4"/><line x1="8" y1="60" x2="115" y2="60" stroke="#2f5fa6" stroke-width="4"/><rect x="60" y="48" width="12" height="12" fill="none" stroke="#c1272d" stroke-width="2"/></svg>`,
  schneidend:`<svg viewBox="0 0 120 95" width="120"><line x1="8" y1="12" x2="112" y2="86" stroke="#2f5fa6" stroke-width="4"/><line x1="8" y1="86" x2="112" y2="14" stroke="#2f5fa6" stroke-width="4"/></svg>`,
  gleichseitig:`<svg viewBox="0 0 120 110" width="110"><polygon points="60,12 108,95 12,95" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/><text x="46" y="60" font-size="12">a=a=a</text></svg>`,
  gleichschenklig:`<svg viewBox="0 0 120 110" width="110"><polygon points="60,12 100,95 20,95" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/></svg>`,
  rechtwinklig:`<svg viewBox="0 0 150 100" width="130"><polygon points="18,82 140,82 18,28" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/><rect x="18" y="70" width="12" height="12" fill="none" stroke="#c1272d" stroke-width="2"/></svg>`,
  quadrat:`<svg viewBox="0 0 100 100" width="90"><rect x="15" y="15" width="70" height="70" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/><rect x="15" y="73" width="12" height="12" fill="none" stroke="#c1272d" stroke-width="2"/></svg>`,
  rechteck:`<svg viewBox="0 0 120 90" width="110"><rect x="12" y="22" width="96" height="46" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/><rect x="12" y="56" width="12" height="12" fill="none" stroke="#c1272d" stroke-width="2"/></svg>`,
  parallelogramm:`<svg viewBox="0 0 130 90" width="115"><polygon points="30,22 118,22 95,68 7,68" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/></svg>`,
  raute:`<svg viewBox="0 0 110 100" width="100"><polygon points="55,12 100,50 55,88 10,50" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/></svg>`,
  trapez:`<svg viewBox="0 0 130 80" width="115"><polygon points="35,18 95,18 120,64 10,64" fill="#e6eefb" stroke="#2f5fa6" stroke-width="3"/></svg>`
};
</script>

<!-- ============================================================
     KARTE 1 — Strecke / Gerade / Strahl  (Multiple Choice je Figur)
     ============================================================ -->
<script>
(function(){
  const kid='k1';
  const figuren=[
    {svg:SVG.strecke, q:'Was siehst du hier?', opt:['Strecke','Gerade','Strahl'], r:0},
    {svg:SVG.strahl,  q:'Was siehst du hier?', opt:['Strecke','Gerade','Strahl'], r:2},
    {svg:SVG.gerade,  q:'Was siehst du hier?', opt:['Strecke','Gerade','Strahl'], r:1}
  ];
  State[kid]={sel:[null,null,null], geprueft:false};
  let html='<h2>'+KARTEN.find(k=>k.id===kid).title+'</h2>';
  html+='<div class="unter">Eine <b>Strecke</b> hat zwei Endpunkte. Ein <b>Strahl</b> beginnt an einem Punkt und läuft auf einer Seite endlos weiter. Eine <b>Gerade</b> ist auf beiden Seiten endlos.</div>';
  figuren.forEach((f,i)=>{
    html+='<div class="aufgabe"><div class="fig-wrap">'+f.svg+'</div><div class="frage">'+f.q+'</div>';
    f.opt.forEach((o,j)=>{
      html+='<button class="opt" id="k1_'+i+'_'+j+'" onclick="k1sel('+i+','+j+')">'+o+'</button>';
    });
    html+='</div>';
  });
  html+='<div class="btn-row"><button class="btn btn-pruefen" onclick="k1pruefen()">Prüfen</button>'
      +'<button class="btn btn-leeren" id="k1_clear" style="display:none" onclick="k1leeren()">Leeren</button></div>';
  html+='<div class="fb" id="k1_fb"></div>';
  document.getElementById('karte_'+kid).innerHTML=html;
  window._k1=figuren;
})();
function k1sel(i,j){
  if(State.k1.geprueft) return;
  State.k1.sel[i]=j;
  window._k1[i].opt.forEach((o,k)=>{
    document.getElementById('k1_'+i+'_'+k).classList.toggle('sel',k===j);
  });
}
function k1pruefen(){
  if(State.k1.sel.includes(null)){alert('Bitte alle drei Figuren beantworten.');return;}
  let ok=0;
  window._k1.forEach((f,i)=>{
    const sel=State.k1.sel[i];
    f.opt.forEach((o,j)=>{
      const el=document.getElementById('k1_'+i+'_'+j);
      el.classList.remove('sel');
      if(j===f.r) el.classList.add('correct');
      else if(j===sel) el.classList.add('wrong');
    });
    if(sel===f.r) ok++;
  });
  State.k1.geprueft=true;
  State.k1.score=ok;
  const fb=document.getElementById('k1_fb');
  if(ok===3){fb.className='fb ok';fb.textContent='✓ Alles richtig! '+ok+' von 3.';}
  else{fb.className='fb no';fb.innerHTML='✗ '+ok+' von 3 richtig. Die richtigen Antworten sind grün markiert.';
       document.getElementById('k1_clear').style.display='inline-block';}
  markDone('k1');
}
function k1leeren(){
  State.k1.sel=[null,null,null]; State.k1.geprueft=false; State.k1.score=0; Done.k1=false;
  document.getElementById('tab_k1').classList.remove('done');
  window._k1.forEach((f,i)=>f.opt.forEach((o,j)=>{
    document.getElementById('k1_'+i+'_'+j).className='opt';
  }));
  document.getElementById('k1_fb').className='fb';
  document.getElementById('k1_clear').style.display='none';
  pruefeWeiter();
}
</script>

<!-- ============================================================
     KARTE 2 — Begriffe & Symbole zuordnen (Kategorien per Antippen)
     ============================================================ -->
<script>
(function(){
  const kid='k2';
  // Elemente sollen Eigenschaften den drei Begriffen zuordnen
  const items=[
    {t:'zwei Endpunkte', kat:'Strecke'},
    {t:'beidseitig endlos', kat:'Gerade'},
    {t:'ein Anfangspunkt', kat:'Strahl'},
    {t:'hat eine messbare Länge', kat:'Strecke'},
    {t:'in eine Richtung endlos', kat:'Strahl'},
    {t:'keine Endpunkte', kat:'Gerade'}
  ];
  // Reihenfolge mischen, damit nichts vorsortiert wirkt
  const order=[3,0,5,2,1,4];
  State[kid]={platz:{}, geprueft:false}; // itemIndex -> kategorie
  let html='<h2>'+KARTEN.find(k=>k.id===kid).title+'</h2>';
  html+='<div class="unter">Tippe eine Eigenschaft an und dann den passenden Begriff. Erneut antippen löst sie wieder.</div>';
  html+='<div class="pool" id="k2pool">';
  order.forEach(i=>{ html+='<button class="chip" data-i="'+i+'" onclick="k2pick('+i+')">'+items[i].t+'</button>'; });
  html+='</div>';
  ['Strecke','Gerade','Strahl'].forEach(kat=>{
    html+='<div class="kat" id="k2_'+kat+'" onclick="k2drop(\''+kat+'\')"><h4>'+kat+'</h4><div class="inhalt"></div></div>';
  });
  html+='<div class="btn-row"><button class="btn btn-pruefen" onclick="k2pruefen()">Prüfen</button>'
      +'<button class="btn btn-leeren" id="k2_clear" style="display:none" onclick="k2leeren()">Leeren</button></div>';
  html+='<div class="fb" id="k2_fb"></div>';
  document.getElementById('karte_'+kid).innerHTML=html;
  window._k2={items,order,picked:null};
})();
function k2pick(i){
  if(State.k2.geprueft) return;
  const w=window._k2;
  const chip=document.querySelector('#k2pool .chip[data-i="'+i+'"]');
  // bereits platziert? -> zurück in Pool
  if(State.k2.platz[i]!==undefined){
    delete State.k2.platz[i]; k2render(); return;
  }
  if(w.picked===i){w.picked=null;chip&&chip.classList.remove('sel');return;}
  w.picked=i; k2render();
}
function k2drop(kat){
  const w=window._k2;
  if(w.picked===null||State.k2.geprueft) return;
  State.k2.platz[w.picked]=kat; w.picked=null; k2render();
}
function k2render(){
  const w=window._k2;
  // Pool
  document.querySelectorAll('#k2pool .chip').forEach(c=>{
    const i=+c.dataset.i;
    c.style.display=(State.k2.platz[i]!==undefined)?'none':'flex';
    c.classList.toggle('sel', w.picked===i);
  });
  // Kategorien
  ['Strecke','Gerade','Strahl'].forEach(kat=>{
    const inh=document.querySelector('#k2_'+kat+' .inhalt'); inh.innerHTML='';
    Object.keys(State.k2.platz).forEach(i=>{
      if(State.k2.platz[i]===kat){
        const b=document.createElement('button');
        b.className='chip platziert'; b.textContent=w.items[i].t;
        b.onclick=()=>k2pick(+i);
        inh.appendChild(b);
      }
    });
  });
}
function k2pruefen(){
  const w=window._k2;
  if(Object.keys(State.k2.platz).length<w.items.length){alert('Bitte alle Eigenschaften zuordnen.');return;}
  let ok=0;
  w.items.forEach((it,i)=>{ if(State.k2.platz[i]===it.kat) ok++; });
  State.k2.geprueft=true; State.k2.score=ok; State.k2.max=w.items.length;
  const fb=document.getElementById('k2_fb');
  if(ok===w.items.length){fb.className='fb ok';fb.textContent='✓ Perfekt zugeordnet! '+ok+' von '+w.items.length+'.';}
  else{
    fb.className='fb no';
    let txt='✗ '+ok+' von '+w.items.length+' richtig.<span class="loesung">Richtig: ';
    txt+=w.items.map(it=>it.t+' → '+it.kat).join(' · ')+'</span>';
    fb.innerHTML=txt;
    document.getElementById('k2_clear').style.display='inline-block';
  }
  markDone('k2');
}
function k2leeren(){
  State.k2={platz:{},geprueft:false}; window._k2.picked=null; Done.k2=false;
  document.getElementById('tab_k2').classList.remove('done');
  document.getElementById('k2_fb').className='fb';
  document.getElementById('k2_clear').style.display='none';
  k2render(); pruefeWeiter();
}
</script>

<!-- ============================================================
     KARTE 3 — Parallel / senkrecht  (MIT NIVEAUSTUFEN)
     ============================================================ -->
<script>
(function(){
  const kid='k3';
  Niveau[kid]='grund';
  State[kid]={grund:{},fort:{},profi:{}};

  const title=KARTEN.find(k=>k.id===kid).title;
  let html='<h2>'+title+'</h2>';
  html+=niveauLeiste(kid,[{key:'grund',label:'Grundlagen'},{key:'fort',label:'Fortgeschritten'},{key:'profi',label:'Profi'}]);
  html+='<div id="wrap_'+kid+'">';

  html+='<div class="stufe-view" data-stufe="grund" style="display:block">'
    +'<div class="unter">Sind die beiden blauen Geraden <b>parallel</b> oder <b>senkrecht</b> zueinander?</div>'
    +bildMC('g',0,SVG.parallel,['parallel','senkrecht'],0)
    +bildMC('g',1,SVG.senkrecht,['parallel','senkrecht'],1)
    +'<div class="btn-row"><button class="btn btn-pruefen" onclick="k3pruefen(\'grund\')">Prüfen</button>'
    +'<button class="btn btn-leeren" id="k3_grund_clear" style="display:none" onclick="k3leeren(\'grund\')">Leeren</button></div>'
    +'<div class="fb" id="k3_grund_fb"></div></div>';

  // --- Fortgeschritten: 3 Bilder, eine Option mehr (auch "schneidend") ---
  html+='<div class="stufe-view" data-stufe="fort" style="display:none">'
    +'<div class="unter">Wie liegen die Geraden zueinander? Achte beim rechten Winkel auf das kleine Kästchen.</div>'
    +bildMC('f',0,SVG.senkrecht,['parallel','senkrecht','schneidend (nicht senkrecht)'],1)
    +bildMC('f',1,SVG.parallel,['parallel','senkrecht','schneidend (nicht senkrecht)'],0)
    +bildMC('f',2,SVG.schneidend,['parallel','senkrecht','schneidend (nicht senkrecht)'],2)
    +'<div class="btn-row"><button class="btn btn-pruefen" onclick="k3pruefen(\'fort\')">Prüfen</button>'
    +'<button class="btn btn-leeren" id="k3_fort_clear" style="display:none" onclick="k3leeren(\'fort\')">Leeren</button></div>'
    +'<div class="fb" id="k3_fort_fb"></div></div>';

  // --- Profi: Lückentext + Begründung (Texteingabe + Selbstkontrolle) ---
  html+='<div class="stufe-view" data-stufe="profi" style="display:none">'
    +'<div class="unter">Fülle die Aussagen über Lagebeziehungen aus.</div>'
    +'<div class="aufgabe"><div class="frage">Zwei Geraden, die sich in einem rechten Winkel (90°) schneiden, nennt man <input type="text" class="luecke" id="k3p0">.</div></div>'
    +'<div class="aufgabe"><div class="frage">Zwei Geraden, die überall den gleichen Abstand haben und sich nie schneiden, sind zueinander <input type="text" class="luecke" id="k3p1">.</div></div>'
    +'<div class="aufgabe"><div class="frage">Das Symbol für „senkrecht zu" ist <input type="text" class="luecke" id="k3p2"> (Tippe: senkrecht).</div></div>'
    +'<div class="btn-row"><button class="btn btn-pruefen" onclick="k3pruefen(\'profi\')">Prüfen</button>'
    +'<button class="btn btn-leeren" id="k3_profi_clear" style="display:none" onclick="k3leeren(\'profi\')">Leeren</button></div>'
    +'<div class="fb" id="k3_profi_fb"></div>'
    +tippBox('k3p')+'</div>';

  html+='</div>';
  document.getElementById('karte_'+kid).innerHTML=html;

  // Antwortschlüssel
  window._k3={
    grund:{type:'mc',keys:[0,1],pre:'k3_g_'},
    fort:{type:'mc',keys:[1,0,2],pre:'k3_f_'},
    profi:{type:'text',answers:[['senkrecht','orthogonal'],['parallel'],['senkrecht','orthogonal']]}
  };

  function bildMC(p,i,svg,opts,r){
    let h='<div class="aufgabe"><div class="fig-wrap">'+svg+'</div>';
    opts.forEach((o,j)=>{ h+='<button class="opt" id="k3_'+p+'_'+i+'_'+j+'" onclick="k3sel(\''+p+'\','+i+','+j+')">'+o+'</button>'; });
    return h+'</div>';
  }
  function tippBox(pre){
    return '<button class="btn btn-tipp" id="'+pre+'_tippbtn" style="display:none" onclick="oeffneTipp(\''+pre+'\')">💡 Tipp anzeigen</button>'
      +'<div class="tipp-box" id="'+pre+'_tipps">'
      +'<div class="tipp-stufe" data-s="0">Tipp 1: „senkrecht" bedeutet ein rechter Winkel (90°). „parallel" heißt: gleicher Abstand, kein Schnittpunkt.</div>'
      +'<div class="tipp-stufe" data-s="1">Tipp 2: Lies die Aufgabe genau – im ersten Satz geht es um den 90°-Winkel, im zweiten um den gleichbleibenden Abstand.</div>'
      +'<div class="tipp-stufe" data-s="2">Lösung: 1) senkrecht (orthogonal) · 2) parallel · 3) senkrecht</div>'
      +'</div>';
  }
  // expose helpers used at build only via closure -> store opt arrays for feedback
  window._k3opts={
    g:[['parallel','senkrecht'],['parallel','senkrecht']],
    f:[['parallel','senkrecht','schneidend'],['parallel','senkrecht','schneidend'],['parallel','senkrecht','schneidend']]
  };
})();

function k3sel(p,i,j){
  const stufe=(p==='g')?'grund':'fort';
  if(State.k3[stufe].geprueft) return;
  State.k3[stufe]['sel'+i]=j;
  const opts=window._k3opts[p][i];
  opts.forEach((o,k)=>{document.getElementById('k3_'+p+'_'+i+'_'+k).classList.toggle('sel',k===j);});
}
function k3pruefen(stufe){
  const cfg=window._k3[stufe];
  const fb=document.getElementById('k3_'+stufe+'_fb');
  if(cfg.type==='mc'){
    const p=(stufe==='grund')?'g':'f';
    const n=cfg.keys.length;
    for(let i=0;i<n;i++){ if(State.k3[stufe]['sel'+i]===undefined){alert('Bitte alle Aufgaben beantworten.');return;} }
    let ok=0;
    for(let i=0;i<n;i++){
      const sel=State.k3[stufe]['sel'+i], r=cfg.keys[i];
      window._k3opts[p][i].forEach((o,j)=>{
        const el=document.getElementById('k3_'+p+'_'+i+'_'+j); el.classList.remove('sel');
        if(j===r) el.classList.add('correct'); else if(j===sel) el.classList.add('wrong');
      });
      if(sel===r) ok++;
    }
    State.k3[stufe].geprueft=true; State.k3[stufe].score=ok; State.k3[stufe].max=n;
    if(ok===n){fb.className='fb ok';fb.textContent='✓ Stark! '+ok+' von '+n+'.';}
    else{fb.className='fb no';fb.innerHTML='✗ '+ok+' von '+n+' richtig (grün = richtig).';
         document.getElementById('k3_'+stufe+'_clear').style.display='inline-block';}
  } else {
    // profi text
    const inps=[0,1,2].map(i=>document.getElementById('k3p'+i));
    if(inps.some(x=>x.value.trim()==='')){alert('Bitte alle Lücken ausfüllen.');return;}
    let ok=0;
    inps.forEach((inp,i)=>{
      const v=inp.value.trim().toLowerCase();
      const richtig=cfg.answers[i].includes(v);
      inp.style.borderColor=richtig?'var(--gruen)':'var(--rot)';
      inp.style.background=richtig?'var(--gruen-bg)':'var(--rot-bg)';inp.style.color='#fff';
      if(richtig) ok++;
    });
    State.k3.profi.geprueft=true; State.k3.profi.score=ok; State.k3.profi.max=3;
    if(ok===3){fb.className='fb ok';fb.textContent='✓ Alles korrekt!';}
    else{fb.className='fb no';fb.innerHTML='✗ '+ok+' von 3 richtig. Nutze den Tipp, um es zu verbessern.';
         document.getElementById('k3_profi_clear').style.display='inline-block';
         document.getElementById('k3p_tippbtn').style.display='inline-block';}
  }
  // Karte gilt als fertig, wenn die AKTUELL sichtbare Stufe geprüft wurde
  markDone('k3');
}
function k3leeren(stufe){
  if(stufe==='profi'){
    [0,1,2].forEach(i=>{const inp=document.getElementById('k3p'+i);inp.value='';inp.style.borderColor='';inp.style.background='';inp.style.color='';});
    document.getElementById('k3p_tipps').className='tipp-box';
    document.querySelectorAll('#k3p_tipps .tipp-stufe').forEach(t=>t.classList.remove('open'));
    document.getElementById('k3p_tippbtn').style.display='none';
    State.k3.profi={};
  } else {
    const p=(stufe==='grund')?'g':'f';
    const n=window._k3[stufe].keys.length;
    for(let i=0;i<n;i++) window._k3opts[p][i].forEach((o,j)=>{
      const el=document.getElementById('k3_'+p+'_'+i+'_'+j); if(el) el.className='opt';
    });
    State.k3[stufe]={};
  }
  document.getElementById('k3_'+stufe+'_fb').className='fb';
  document.getElementById('k3_'+stufe+'_clear').style.display='none';
}
let _tippStep={};
function oeffneTipp(pre){
  document.getElementById(pre+'_tipps').classList.add('open');
  _tippStep[pre]=(_tippStep[pre]||0);
  const stufen=document.querySelectorAll('#'+pre+'_tipps .tipp-stufe');
  if(_tippStep[pre]<stufen.length){ stufen[_tippStep[pre]].classList.add('open'); _tippStep[pre]++; }
  const btn=document.getElementById(pre+'_tippbtn');
  btn.textContent=_tippStep[pre]<stufen.length?'💡 Nächster Tipp':'Alle Tipps gezeigt';
}
</script>

<!-- ============================================================
     KARTE 4 — Besondere Dreiecke (MIT NIVEAUSTUFEN)
     ============================================================ -->
<script>
(function(){
  const kid='k4';
  Niveau[kid]='grund';
  State[kid]={grund:{},fort:{},profi:{}};
  let html='<h2>'+KARTEN.find(k=>k.id===kid).title+'</h2>';
  html+=niveauLeiste(kid,[{key:'grund',label:'Grundlagen'},{key:'fort',label:'Fortgeschritten'},{key:'profi',label:'Profi'}]);
  html+='<div id="wrap_'+kid+'">';

  // Grundlagen: Mehrfachauswahl pro Dreieck – welche Namen treffen ALLE zu?
  html+='<div class="stufe-view" data-stufe="grund" style="display:block">'
    +'<div class="unter">Tippe <b>alle</b> Namen an, die auf das Dreieck zutreffen. (Es können mehrere sein – ein gleichseitiges Dreieck ist z. B. auch gleichschenklig.)</div>'

    +d4(1,SVG.rechtwinklig,['gleichseitig','gleichschenklig','rechtwinklig'])
    +'<div class="btn-row"><button class="btn btn-pruefen" onclick="k4pruefen(\'grund\')">Prüfen</button>'

    +'<div class="fb" id="k4_grund_fb"></div></div>';

  // Fortgeschritten: Mehrfachauswahl – welche Aussagen stimmen?
  html+='<div class="stufe-view" data-stufe="fort" style="display:none">'
    +'<div class="unter">Welche Aussagen über Dreiecke sind <b>richtig</b>? (Mehrere möglich – tippe alle richtigen an.)</div>'
    +'<div class="aufgabe">'
    +mc4('f',0,'Ein gleichseitiges Dreieck hat drei gleich lange Seiten.',true)
    +mc4('f',1,'Ein gleichschenkliges Dreieck hat genau zwei gleich lange Seiten.',true)
    +mc4('f',2,'Ein rechtwinkliges Dreieck hat einen rechten Winkel (90°).',true)

    +'</div>'
    +'<div class="btn-row"><button class="btn btn-pruefen" onclick="k4pruefen(\'fort\')">Prüfen</button>'
    +'<button class="btn btn-leeren" id="k4_fort_clear" style="display:none" onclick="k4leeren(\'fort\')">Leeren</button></div>'
    +'<div class="fb" id="k4_fort_fb"></div></div>';

  // Profi: Texteingabe mit gestuftem Tipp
  html+='<div class="stufe-view" data-stufe="profi" style="display:none">'
    +'<div class="unter">Beantworte mit dem passenden Fachbegriff.</div>'
    +'<div class="aufgabe"><div class="frage">Ein Dreieck mit drei gleich langen Seiten heißt … <input type="text" class="luecke" id="k4p0"></div></div>'
    +'<div class="aufgabe"><div class="frage">Wie viele gleich lange Seiten hat ein gleichschenkliges Dreieck mindestens? <input type="text" class="luecke" inputmode="numeric" id="k4p1"></div></div>'
    +'<div class="aufgabe"><div class="frage">Wie groß ist der besondere Winkel im rechtwinkligen Dreieck (in Grad)? <input type="text" class="luecke" inputmode="numeric" id="k4p2"></div></div>'
    +'<div class="btn-row"><button class="btn btn-pruefen" onclick="k4pruefen(\'profi\')">Prüfen</button>'
    +'<button class="btn btn-leeren" id="k4_profi_clear" style="display:none" onclick="k4leeren(\'profi\')">Leeren</button></div>'
    +'<div class="fb" id="k4_profi_fb"></div>'
    +'<button class="btn btn-tipp" id="k4p_tippbtn" style="display:none" onclick="oeffneTipp(\'k4p\')">💡 Tipp anzeigen</button>'
    +'<div class="tipp-box" id="k4p_tipps">'
      +'<div class="tipp-stufe" data-s="0">Tipp 1: „gleich" steckt im Namen. Zähle bei „Schenkeln" an die Schenkel eines Winkels.</div>'
      +'<div class="tipp-stufe" data-s="1">Tipp 2: Ein rechter Winkel ist genau ein Viertel einer vollen Drehung (360°).</div>'
      +'<div class="tipp-stufe" data-s="2">Lösung: gleichseitig · 2 · 90</div>'
    +'</div></div>';

  html+='</div>';
  document.getElementById('karte_'+kid).innerHTML=html;

  window._k4={
    gOpts:[['gleichseitig','gleichschenklig','rechtwinklig'],['gleichseitig','gleichschenklig','rechtwinklig']],
    // korrekte Mengen je Dreieck: gleichseitig -> auch gleichschenklig; rechtwinklig (ungleichschenklig) -> nur rechtwinklig
    gKeys:[[0,1],[2]],
    fAnswers:[true,true,true,false],
    pAnswers:[['gleichseitig'],['2','zwei'],['90']]
  };

  function d4(i,svg,opts){
    let h='<div class="aufgabe"><div class="fig-wrap">'+svg+'</div>';
    opts.forEach((o,j)=>{h+='<button class="opt" id="k4_g_'+i+'_'+j+'" onclick="k4toggleG('+i+','+j+')">'+o+'</button>';});
    return h+'</div>';
  }
  function mc4(p,i,txt,corr){
    return '<button class="opt" id="k4_f_'+i+'" onclick="k4toggle('+i+')">'+txt+'</button>';
  }
})();
function k4toggleG(i,j){
  if(State.k4.grund.geprueft) return;
  const key='c'+i+'_'+j;
  State.k4.grund[key]=!State.k4.grund[key];
  document.getElementById('k4_g_'+i+'_'+j).classList.toggle('sel',State.k4.grund[key]);
}
function k4toggle(i){
  if(State.k4.fort.geprueft) return;
  State.k4.fort['c'+i]=!State.k4.fort['c'+i];
  document.getElementById('k4_f_'+i).classList.toggle('sel',State.k4.fort['c'+i]);
}
function k4pruefen(stufe){
  const w=window._k4, fb=document.getElementById('k4_'+stufe+'_fb');
  if(stufe==='grund'){
    // Mehrfachauswahl pro Dreieck: jede Option muss korrekt an/aus sein
    let ok=0, max=0;
    [0,1].forEach(i=>{
      const richtigSet=w.gKeys[i];
      w.gOpts[i].forEach((o,j)=>{
        max++;
        const sel=!!State.k4.grund['c'+i+'_'+j];

  } else if(stufe==='fort'){

         document.getElementById('k4_profi_clear').style.display='inline-block';

  }

}

/* ---------- Aufgabe A: Paare ---------- */

}
function k5pickR(ri){
  if(State.k5.A.geprueft) return;
  const belegt=Object.values(State.k5.A.paare).includes(ri);
  if(belegt){const lid=Object.keys(State.k5.A.paare).find(k=>State.k5.A.paare[k]===ri);delete State.k5.A.paare[lid];k5renderA();return;}
  if(State.k5.A.selL!==null){State.k5.A.paare[State.k5.A.selL]=ri;State.k5.A.selL=null;}
  k5renderA();
}
function k5renderA(){
  const w=window._k5;
  let nr=1;const nummern={};

  w.links.forEach(l=>{
    const el=document.getElementById('k5_'+l.id);const num=el.querySelector('.num');

  });

    const el=document.getElementById('k5_R'+i);const num=el.querySelector('.num');
    const lid=Object.keys(State.k5.A.paare).find(k=>State.k5.A.paare[k]===i);
    if(lid!==undefined){el.classList.add('verbunden');num.style.visibility='visible';num.textContent=nummern[lid];}
    else{el.classList.remove('verbunden');num.style.visibility='hidden';}
  });
}
function k5pruefenA(){
  const w=window._k5;
  if(Object.keys(State.k5.A.paare).length<w.links.length){alert('Bitte alle Figuren verbinden.');return;}

  w.links.forEach(l=>{const ri=State.k5.A.paare[l.id];if(ri!==undefined&&w.rechtsNamen[ri]===l.name)ok++;});
  State.k5.A.geprueft=true;State.k5.A.score=ok;State.k5.A.max=w.links.length;

}

/* ---------- Aufgabe B: Hierarchie-Mehrfachauswahl ---------- */

    if(sel===istRichtig)ok++;

    if(State.kw.grund.sel===undefined){alert('Bitte eine Antwort wählen.');return;}

  } else {
    const inps=[0,1].map(i=>document.getElementById('kwp'+i));
    if(inps.some(x=>x.value.trim()==='')){alert('Bitte beide Felder ausfüllen.');return;}
    let ok=0;
    inps.forEach((inp,i)=>{const richtig=w.pAns[i].includes(inp.value.trim());
      inp.style.borderColor=richtig?'var(--gruen)':'var(--rot)';inp.style.background=richtig?'var(--gruen-bg)':'var(--rot-bg)';inp.style.color='#fff';if(richtig)ok++;});
    State.kw.profi.geprueft=true;State.kw.profi.score=ok;State.kw.profi.max=2;
    if(ok===2){fb.className='fb ok';fb.textContent='✓ Beide richtig!';}
    else{fb.className='fb no';fb.innerHTML='✗ '+ok+' von 2 richtig. Der gestufte Tipp hilft.';
         document.getElementById('kw_profi_clear').style.display='inline-block';
         document.getElementById('kwp_tippbtn').style.display='inline-block';}
  }
  markDone('kw');
}
function kwleeren(stufe){
  if(stufe==='grund'){for(let j=0;j<window._kw.gOpts;j++)document.getElementById('kw_g_'+j).className='opt';State.kw.grund={};}
  else if(stufe==='fort'){[0,1,2,3].forEach(i=>{const inp=document.getElementById('kwf'+i);inp.value='';inp.style.borderColor='';inp.style.background='';inp.style.color='';});State.kw.fort={};}
  else{[0,1].forEach(i=>{const inp=document.getElementById('kwp'+i);inp.value='';inp.style.borderColor='';inp.style.background='';inp.style.color='';});
    document.getElementById('kwp_tipps').className='tipp-box';
    document.querySelectorAll('#kwp_tipps .tipp-stufe').forEach(t=>t.classList.remove('open'));
    document.getElementById('kwp_tippbtn').style.display='none';State.kw.profi={};}
  document.getElementById('kw_'+stufe+'_fb').className='fb';
  document.getElementById('kw_'+stufe+'_clear').style.display='none';
}
</script>

     KARTE A — AUSWERTUNG

<script>
function aktuellerScore(kid){
  // Karten mit Niveau: Score der zuletzt geprüften / aktiven Stufe
  const niveauKarten=['k3','k4','kw'];
  if(niveauKarten.includes(kid)){
    const stufe=Niveau[kid]||'grund';
    const s=State[kid][stufe];
    if(s && s.geprueft) return {score:s.score, max:s.max, stufe:stufe};
    // sonst irgendeine geprüfte Stufe nehmen
    for(const st of ['profi','fort','grund']){
      if(State[kid][st] && State[kid][st].geprueft) return {score:State[kid][st].score,max:State[kid][st].max,stufe:st};
    }
    return null;
  }
  const s=State[kid];
  if(s && s.geprueft) return {score:s.score, max:s.max||(kid==='k1'?3:undefined)};
  return null;
}
function renderAuswertung(){
  const labels={k1:'1 · Strecke/Gerade/Strahl',k2:'2 · Zuordnen',k3:'3 · Parallel/Senkrecht',
    k4:'4 · Dreiecke',k5:'5 · Vierecke',k6:'6 · Eigenschaften',kw:'🔁 Wiederholung'};
  let html='<h2>Deine Auswertung</h2><div class="unter">Übersicht über alle bearbeiteten Karten.</div>';
  let gOK=0,gMax=0,fertig=0;
  let rows='';
  PRUEFBAR.forEach(kid=>{
    const r=aktuellerScore(kid);
    if(r && r.max!==undefined){
      gOK+=r.score;gMax+=r.max;fertig++;
      const proz=Math.round(r.score/r.max*100);
      rows+='<div class="score-row"><span>'+labels[kid]+(r.stufe?' <small style="color:var(--grau)">('+r.stufe+')</small>':'')+'</span>'
        +'<span class="'+(proz>=50?'s-ok':'s-no')+'">'+r.score+' / '+r.max+'</span></div>';
    } else {
      rows+='<div class="score-row"><span>'+labels[kid]+'</span><span style="color:var(--grau)">offen</span></div>';
    }
  });
  if(fertig<PRUEFBAR.length){
    html+='<div class="fb no" style="display:block">Es sind noch nicht alle Karten geprüft. Bearbeite die offenen Karten über die Registerkarten oben.</div>';
  }
  const proz=gMax?Math.round(gOK/gMax*100):0;
  html+='<div class="score-big">'+gOK+' / '+gMax+'</div>';
  html+='<div style="text-align:center;font-weight:700;color:var(--grau);margin-bottom:10px">'+proz+'% richtig</div>';
  html+=rows;
  let lob = proz>=80?'Klasse gemacht! 🦖 Du kennst dich super aus.':proz>=50?'Gut dabei! Schau dir die roten Karten noch einmal an.':'Übe die Begriffe ruhig noch einmal – du schaffst das!';
  html+='<div class="fb ok" style="display:block;margin-top:14px">'+lob+'</div>';
  document.getElementById('karte_ka').innerHTML=html;
}
// beim ersten Anzeigen rendern
const _origZeige=zeigeKarte;
zeigeKarte=function(id){_origZeige(id); if(id==='ka') renderAuswertung();};
renderAuswertung();
</script>
