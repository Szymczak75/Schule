<html lang="de">
<head>

<style>
:root{
  --kopf:#c97a2e;          /* Erarbeitung = Orange */
  --kopf2:#a5611e;
  --bg:#faf7f2;
  --karte:#ffffff;
  --rand:#e4dcd0;
  --rand2:#dbe3ee;
  --text:#22303f;
  --grau:#6b7686;
  --blau:#2f5fa6;
  --gruen:#1e7d32;
  --gruen-bg:#1e7d32;
  --rot:#c1272d;
  --rot-bg:#c1272d;
  --amber:#b8860b;
  --amber-light:#fdf3d9;
  --amber-dark:#96690a;
  --schatten:0 4px 16px rgba(165,97,30,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);
  background-image:radial-gradient(circle at 10% 6%,#fbeee0 0,transparent 42%),radial-gradient(circle at 92% 96%,#fbeee0 0,transparent 44%);
  color:var(--text);font-size:17px;line-height:1.5;padding:0 0 60px 0;min-height:100vh;
}
h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;}
.kopf{background:linear-gradient(120deg,var(--kopf),var(--kopf2));color:#fff;padding:18px 20px 16px;box-shadow:0 2px 14px rgba(165,97,30,.25);}
.kopf h1{margin:0;font-size:1.5rem;}
.kopf p{margin:4px 0 0;font-size:.95rem;opacity:.95;font-weight:600;}
.badge{display:inline-block;background:rgba(255,255,255,.24);border-radius:20px;padding:2px 12px;font-size:.8rem;font-weight:700;margin-top:8px;}

.tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;position:sticky;top:0;z-index:30;background:var(--bg);box-shadow:0 4px 10px -8px rgba(0,0,0,.3);}
.tab{flex:1 1 auto;min-width:44px;min-height:44px;border:2px solid var(--rand);background:var(--karte);border-radius:14px;font-family:'Fredoka',sans-serif;font-weight:500;font-size:.95rem;color:var(--grau);cursor:pointer;padding:6px 10px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab.aktiv{background:var(--kopf);color:#fff;border-color:var(--kopf);box-shadow:var(--schatten);}

.wrap{max-width:960px;margin:0 auto;padding:6px 14px;}
.karte{background:var(--karte);border:1px solid var(--rand);border-radius:20px;padding:20px 18px;margin:14px 0;box-shadow:var(--schatten);display:none;animation:fade .25s ease;}
.karte.aktiv{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.karte h2{margin:0 0 4px;font-size:1.25rem;color:var(--kopf);}
.karte .unter{color:var(--grau);font-weight:600;font-size:.92rem;margin-bottom:14px;}

/* Haus-Diagramm */
.haus{display:flex;flex-direction:column;align-items:center;gap:0;margin:6px 0 4px;}
.etage{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;position:relative;z-index:2;margin:7px 0;}
.etagenlabel{font-size:.78rem;font-weight:800;color:var(--grau);letter-spacing:.04em;text-transform:uppercase;margin-top:10px;}
.kfig{
  border:3px solid var(--rand2);background:#f6f8fb;border-radius:16px;
  padding:6px 8px 6px;cursor:pointer;min-width:118px;min-height:118px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:transform .12s,border-color .15s,background .15s;
  font-family:inherit;
}
.kfig:active{transform:scale(.97);}
.kfig .name{font-family:'Fredoka';font-weight:600;font-size:.98rem;color:var(--text);line-height:1.2;}
.kfig.gewaehlt{border-color:var(--kopf);background:#fbeee0;box-shadow:0 0 0 4px rgba(201,122,46,.18);transform:scale(1.04);}
.kfig.ist{border-color:var(--gruen);background:rgba(30,125,50,.10);}
.kfig.istnicht{border-color:var(--rot);background:rgba(193,39,45,.08);}
.kfig .marke{font-size:1.05rem;height:1.2em;font-weight:800;}
.kfig.ist .marke{color:var(--gruen);}
.kfig.istnicht .marke{color:var(--rot);}
.kfig canvas{width:84px;height:84px;display:block;touch-action:none;}

.hinweisleiste{font-size:.85rem;color:var(--grau);text-align:center;font-weight:600;margin:6px 0 12px;}

/* Erklärbox */
.erkl{margin-top:10px;border-radius:16px;border:2px solid var(--rand);background:#faf7f2;padding:14px;display:none;}
.erkl.show{display:block;animation:fade .2s ease;}
.erkl h3{margin:0 0 8px;font-size:1.1rem;color:var(--kopf);}
.erkl .zeile{display:flex;gap:10px;align-items:flex-start;padding:9px 10px;border-radius:12px;margin:7px 0;font-weight:600;font-size:.96rem;}
.erkl .zeile.ja{background:var(--gruen-bg);color:#fff;}
.erkl .zeile.nein{background:var(--rot-bg);color:#fff;}
.erkl .zeile .sym{font-size:1.2rem;font-weight:800;line-height:1.3;}
.erkl .zeile b{font-family:'Fredoka';font-weight:600;}
.erkl .merksatz{margin-top:12px;background:#fbeee0;border:1px dashed var(--kopf);border-radius:12px;padding:10px 12px;font-size:.95rem;color:#a5611e;font-weight:700;}

/* Große Bühne (Karte 2) */
.buehne{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;}
.buehne-links{flex:1 1 300px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.buehne-canvas{width:100%;max-width:340px;aspect-ratio:1/1;background:#f6f8fb;border:2px solid var(--rand2);border-radius:18px;touch-action:none;overscroll-behavior:contain;}
.buehne-rechts{flex:1 1 260px;}
.waehler{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.waehler button{min-height:44px;min-width:44px;padding:8px 12px;border-radius:12px;border:2px solid var(--rand2);background:#f6f8fb;font-family:'Fredoka';font-weight:500;font-size:.92rem;color:var(--text);cursor:pointer;}
.waehler button.aktiv{background:var(--kopf);border-color:var(--kopf);color:#fff;}
.steuer{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.steuer button{min-height:44px;min-width:44px;padding:8px 14px;border-radius:12px;border:2px solid var(--rand);background:var(--karte);font-family:'Fredoka';font-weight:500;font-size:.92rem;color:var(--text);cursor:pointer;}
.steuer button:active{transform:scale(.97);}
.steckbrief{background:var(--amber-light);border:2px solid var(--amber);border-radius:16px;padding:12px 14px;color:var(--amber-dark);}
.steckbrief h3{margin:0 0 6px;font-size:1.05rem;color:var(--amber-dark);}
.steckbrief ul{margin:0;padding-left:20px;font-weight:600;font-size:.95rem;}
.steckbrief li{margin:4px 0;}

/* Flip-Cards */
.flip-grid{display:flex;flex-wrap:wrap;gap:12px;}
.flip{flex:1 1 250px;perspective:1000px;cursor:pointer;}
/* Beide Seiten liegen im selben Grid-Feld übereinander. Die höhere Seite
   bestimmt die Höhe der Karte – so passt der Text immer vollständig hinein. */
.flip-inner{display:grid;width:100%;min-height:150px;transition:transform .5s;transform-style:preserve-3d;}
.flip.flipped .flip-inner{transform:rotateY(180deg);}
.flip-face{grid-area:1/1;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px 16px;font-weight:700;line-height:1.4;-webkit-hyphens:auto;hyphens:auto;overflow-wrap:break-word;}
.flip-front{background:#fbeee0;border:2px solid var(--kopf);color:#a5611e;font-size:1rem;}
.flip-back{background:var(--amber-light);border:2px solid var(--amber);color:var(--amber-dark);transform:rotateY(180deg);font-size:.92rem;}
.flip-hint{font-size:.8rem;color:var(--grau);font-weight:600;margin-top:8px;}

.trex{position:fixed;right:12px;bottom:14px;font-size:1.7rem;cursor:pointer;z-index:60;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));user-select:none;}
.trex .made{position:absolute;right:0;bottom:120%;white-space:nowrap;background:#22303f;color:#fff;padding:5px 10px;border-radius:10px;font-size:.78rem;font-weight:700;font-family:'Fredoka';display:none;}
.trex.show .made{display:block;}

@media(max-width:520px){
  .kfig{min-width:100px;min-height:100px;}
  .kfig canvas{width:66px;height:66px;}
}
</style>

<body>

<header class="kopf">
  <h1>Das Haus der Grundkörper</h1>
  <p>Entdecke, was ein Körper noch alles ist – und warum</p>
  <span class="badge">Erarbeitung · Klasse 5</span>
</header>

<nav class="tabs" id="tabs"></nav>
<div class="wrap" id="karten"></div>

<div class="trex" id="trex" onclick="this.classList.toggle('show')">🦖<span class="made">Made by Mathedino</span></div>

<script>
/* ============================================================
   MINI-3D-RENDERER  (Canvas 2D, keine Bibliothek)
   - Körper als Kanten-/Flächenmodell in 3D
   - Auto-Rotation + Drehen mit dem Finger (Pointer Events)
   - Painter's Algorithm: Flächen nach Tiefe sortiert zeichnen
   ============================================================ */
const FARBE_FLAECHE='#e6eefb', FARBE_KANTE='#2f5fa6', FARBE_DUNKEL='#c3d3ee';

function rotY(p,a){const c=Math.cos(a),s=Math.sin(a);return [p[0]*c+p[2]*s, p[1], -p[0]*s+p[2]*c];}
function rotX(p,a){const c=Math.cos(a),s=Math.sin(a);return [p[0], p[1]*c-p[2]*s, p[1]*s+p[2]*c];}

/* --- Körper-Definitionen: Ecken + Flächen (Indexlisten) --- */
function bauQuader(bx,by,bz){
  const v=[];
  for(const sx of [-1,1]) for(const sy of [-1,1]) for(const sz of [-1,1]) v.push([sx*bx,sy*by,sz*bz]);
  // Index: (sx,sy,sz) -> ((sx>0)*4 + (sy>0)*2 + (sz>0))
  const i=(x,y,z)=>((x?4:0)+(y?2:0)+(z?1:0));
  const f=[
    [i(0,0,0),i(0,1,0),i(1,1,0),i(1,0,0)],
    [i(0,0,1),i(1,0,1),i(1,1,1),i(0,1,1)],
    [i(0,0,0),i(1,0,0),i(1,0,1),i(0,0,1)],
    [i(0,1,0),i(0,1,1),i(1,1,1),i(1,1,0)],
    [i(0,0,0),i(0,0,1),i(0,1,1),i(0,1,0)],
    [i(1,0,0),i(1,1,0),i(1,1,1),i(1,0,1)]
  ];
  return {v,f};
}
function bauPrisma(n,r,h,dreh){
  dreh=dreh||0;
  const v=[],unten=[],oben=[];
  for(let k=0;k<n;k++){
    const a=dreh+2*Math.PI*k/n;
    v.push([r*Math.cos(a),-h,r*Math.sin(a)]); unten.push(v.length-1);
  }
  for(let k=0;k<n;k++){
    const a=dreh+2*Math.PI*k/n;
    v.push([r*Math.cos(a), h,r*Math.sin(a)]); oben.push(v.length-1);
  }
  const f=[unten.slice().reverse(),oben.slice()];
  for(let k=0;k<n;k++){
    const k2=(k+1)%n;
    f.push([unten[k],unten[k2],oben[k2],oben[k]]);
  }
  return {v,f};
}
function bauPyramide(n,r,h,dreh){
  dreh=dreh||0;
  const v=[],basis=[];
  for(let k=0;k<n;k++){
    const a=dreh+2*Math.PI*k/n;
    v.push([r*Math.cos(a),-h*0.6,r*Math.sin(a)]); basis.push(v.length-1);
  }
  v.push([0,h,0]); const spitze=v.length-1;
  const f=[basis.slice().reverse()];
  for(let k=0;k<n;k++){ const k2=(k+1)%n; f.push([basis[k],basis[k2],spitze]); }
  return {v,f};
}
function bauKegel(r,h,seg){
  return bauPyramide(seg||28,r,h,0);
}
function bauZylinder(r,h,seg){
  return bauPrisma(seg||28,r,h,0);
}
function bauKugel(r,teil){          // teil: 1 = ganze Kugel, 0.5 = Halbkugel (Kuppel oben, Kreis unten)
  const nu=16,nv=24, v=[],f=[];
  const phiMax = (teil<1)? Math.PI/2 : Math.PI;   // phi=0 oben, phi=pi/2 Äquator
  const idx=[];
  for(let i=0;i<=nu;i++){
    const phi = phiMax*i/nu;
    const reihe=[];
    for(let j=0;j<nv;j++){
      const th=2*Math.PI*j/nv;
      v.push([r*Math.sin(phi)*Math.cos(th), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(th)]);
      reihe.push(v.length-1);
    }
    idx.push(reihe);
  }
  for(let i=0;i<nu;i++){
    for(let j=0;j<nv;j++){
      const j2=(j+1)%nv;
      f.push([idx[i][j],idx[i][j2],idx[i+1][j2],idx[i+1][j]]);
    }
  }
  if(teil<1){ f.push(idx[nu].slice().reverse()); } // ebene Kreisfläche unten
  return {v,f,glatt:true, halb:(teil<1)};
}

function bauTetraeder(r){
  // Regulärer (gleichseitiger) Tetraeder: alle 6 Kanten gleich lang,
  // alle 4 Flächen sind gleichseitige Dreiecke.
  // Höhe über der Grundfläche: h = r*sqrt(2)  (r = Umkreisradius der Grundfläche)
  const h = r*Math.SQRT2;
  const yB = -h*0.30, yS = h*0.70;      // um den Schwerpunkt herum zentriert
  const v=[];
  for(let k=0;k<3;k++){
    const a = -Math.PI/2 + 2*Math.PI*k/3;
    v.push([r*Math.cos(a), yB, r*Math.sin(a)]);
  }
  v.push([0,yS,0]);                      // Spitze
  const f=[[2,1,0],[0,1,3],[1,2,3],[2,0,3]];
  return {v,f};
}

const KOERPER={
  wuerfel:   ()=>bauQuader(1,1,1),
  quader:    ()=>bauQuader(1.35,.75,.85),
  prisma:    ()=>bauPrisma(3,1.15,1.0,-Math.PI/2),
  pyramideq: ()=>bauPyramide(4,1.15,1.2,Math.PI/4),
  tetraeder: ()=>bauTetraeder(1.2),
  pyramide:  ()=>bauPyramide(5,1.1,1.2,-Math.PI/2),
  zylinder:  ()=>bauZylinder(.95,1.0,28),
  kegel:     ()=>bauKegel(1.05,1.25,28),
  halbkugel: ()=>bauKugel(1.15,0.5),
  kugel:     ()=>bauKugel(1.15,1),
  koerper:   ()=>bauQuader(1.0,.9,.9)   // Platzhalterform für "allgemeiner Körper"
};

/* --- Renderer --- */
function machRenderer(canvas, koerperKey, opt){
  opt=opt||{};
  const ctx=canvas.getContext('2d');
  const startX = (koerperKey==='halbkugel') ? 0.62 : 0.42;   // Halbkugel stärker kippen → Schnittfläche sichtbar
  const st={rotY:0.6, rotX:startX, auto:true, key:koerperKey, ziehen:false, lx:0, ly:0, laufend:true};
  let geo=KOERPER[koerperKey]();
  let dpr=Math.min(window.devicePixelRatio||1,2);

  function groesse(){
    const w=canvas.clientWidth||120, h=canvas.clientHeight||120;
    canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);
  }
  groesse();
  window.addEventListener('resize',()=>{groesse();});

  function zeichne(){
    const W=canvas.width, H=canvas.height;
    const cx=W/2, cy=H/2, skala=Math.min(W,H)*(opt.skala||0.30);
    ctx.clearRect(0,0,W,H);
    // Punkte transformieren
    const P=geo.v.map(p=>{
      let q=rotY(p,st.rotY); q=rotX(q,st.rotX);
      const d=4.5, f=d/(d - q[2]*0.55);        // leichte Perspektive
      return {x:cx+q[0]*skala*f, y:cy-q[1]*skala*f, z:q[2]};
    });
    // Flächen nach Tiefe sortieren (hinten zuerst)
    const flaechen=geo.f.map(fs=>{
      const zm=fs.reduce((s,i)=>s+P[i].z,0)/fs.length;
      return {fs,zm};
    }).sort((a,b)=>a.zm-b.zm);

    flaechen.forEach(({fs,zm})=>{
      // Rückseiten-Erkennung über Umlaufsinn (Screen-Normale)
      const a=P[fs[0]], b=P[fs[1]], c=P[fs[2]];
      const kreuz=(b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);
      const vorne = kreuz<0;
      if(geo.glatt && !vorne) return;              // Kugel: Rückseite nicht zeichnen
      const t=(zm+1.6)/3.2;                        // 0..1 Tiefe → Helligkeit
      const hell=Math.max(0,Math.min(1,t));
      const füll = mische(FARBE_DUNKEL, FARBE_FLAECHE, hell);
      ctx.beginPath();
      ctx.moveTo(P[fs[0]].x,P[fs[0]].y);
      for(let i=1;i<fs.length;i++) ctx.lineTo(P[fs[i]].x,P[fs[i]].y);
      ctx.closePath();
      ctx.fillStyle=füll;
      ctx.globalAlpha = vorne?1:0.55;              // verdeckte Kanten schimmern durch
      ctx.fill();
      if(!geo.glatt){
        ctx.globalAlpha = vorne?1:0.35;
        ctx.lineWidth=Math.max(1.2, 2.0*dpr*(opt.strich||1));
        ctx.strokeStyle=FARBE_KANTE;
        ctx.lineJoin='round';
        ctx.stroke();
      }else{
        // Kugelnetz: hauchdünne Kante in Füllfarbe → keine Lücken zwischen den Facetten
        ctx.globalAlpha=1;
        ctx.lineWidth=1;
        ctx.strokeStyle=füll;
        ctx.stroke();
      }
      ctx.globalAlpha=1;
    });
    if(geo.glatt){                                  // Umriss (und bei Halbkugel die Schnittkante) nachziehen
      ctx.globalAlpha=1;
      ctx.lineWidth=Math.max(1.4, 2.2*dpr*(opt.strich||1));
      ctx.strokeStyle=FARBE_KANTE;
      if(!geo.halb){
        const r0=geo.v[geo.v.length-1];
        const rad=Math.sqrt(r0[0]*r0[0]+r0[1]*r0[1]+r0[2]*r0[2]);
        ctx.beginPath();
        ctx.arc(cx,cy,rad*skala,0,2*Math.PI);
        ctx.stroke();
      }
      if(geo.halb){
        // Schnittkreis: die unterste Punktreihe als Ellipse nachfahren
        const n=24, start=geo.v.length-n;
        ctx.beginPath();
        for(let j=0;j<n;j++){
          const p=P[start+j];
          if(j===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
  }
  function mische(c1,c2,t){
    const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const A=p(c1),B=p(c2);
    const r=Math.round(A[0]+(B[0]-A[0])*t),g=Math.round(A[1]+(B[1]-A[1])*t),b=Math.round(A[2]+(B[2]-A[2])*t);
    return 'rgb('+r+','+g+','+b+')';
  }

  let letzte=performance.now();
  function frame(t){
    if(!st.laufend) return;
    const dt=Math.min(60,t-letzte); letzte=t;
    if(st.auto && !st.ziehen) st.rotY += 0.00055*dt;
    zeichne();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  /* Finger-Drehen. Ein kurzer Tap (kaum Bewegung) bleibt ein Klick auf die Kachel,
     erst echtes Ziehen dreht den Körper und unterdrückt den Klick. */
  let weg=0;
  canvas.addEventListener('pointerdown',e=>{
    st.ziehen=true; weg=0; st.lx=e.clientX; st.ly=e.clientY;
    try{canvas.setPointerCapture(e.pointerId);}catch(_){}
  });
  canvas.addEventListener('pointermove',e=>{
    if(!st.ziehen) return;
    const dx=e.clientX-st.lx, dy=e.clientY-st.ly;
    weg += Math.abs(dx)+Math.abs(dy);
    st.lx=e.clientX; st.ly=e.clientY;
    st.rotY += dx*0.012;
    st.rotX = Math.max(-1.35, Math.min(1.35, st.rotX + dy*0.012));
    e.preventDefault();
  },{passive:false});
  const ende=e=>{ if(st.ziehen){ st.ziehen=false; try{canvas.releasePointerCapture(e.pointerId);}catch(_){} } };
  canvas.addEventListener('pointerup',ende);
  canvas.addEventListener('pointercancel',ende);
  canvas.addEventListener('touchmove',e=>{ if(st.ziehen) e.preventDefault(); },{passive:false});
  canvas.addEventListener('click',e=>{ if(weg>8){ e.stopPropagation(); e.preventDefault(); weg=0; } });

  function startWinkel(k){ return (k==='halbkugel')?0.62:0.42; }

    st,

    toggleAuto(){ st.auto=!st.auto; return st.auto; },

let aktuellerKoerper=null;
const gesehen=new Set(), geflippt=new Set();

function kWaehle(key){
  if(aktuellerKoerper===key){ kReset(); return; }
  aktuellerKoerper=key;
  gesehen.add(key);
  const d=DATEN[key];
  REIHE.forEach(k=>{
    const el=document.getElementById('kf_'+k);
    el.classList.remove('gewaehlt','ist','istnicht');
    document.getElementById('mk_'+k).textContent='';
  });
  document.getElementById('kf_'+key).classList.add('gewaehlt');
  document.getElementById('mk_'+key).textContent='★';
  Object.keys(d.ist).forEach(k=>{
    document.getElementById('kf_'+k).classList.add('ist');
    document.getElementById('mk_'+k).textContent='✓';
  });
  Object.keys(d.istnicht).forEach(k=>{
    document.getElementById('kf_'+k).classList.add('istnicht');
    document.getElementById('mk_'+k).textContent='✗';
  });
  let h='<h3>Ein '+d.label+' …</h3>';

    h+='<div class="zeile ja"><span class="sym">✓</span><span>… ist auch ein <b>'+DATEN[k].label+'</b>. '+grund+'</span></div>';

}

}

      document.getElementById('wb_'+x).classList.toggle('aktiv',x===k);
    });
    let s='<h3>Steckbrief: '+DATEN[k].label+'</h3><ul>';
    STECKBRIEF[k].forEach(z=>{ s+='<li>'+z+'</li>'; });
    s+='</ul>';
    document.getElementById('steckbrief').innerHTML=s;
  };

  document.getElementById('btnAuto').onclick=function(){
    const an=window.buehne.toggleAuto();
    this.textContent = an ? '⏸ Drehung anhalten' : '▶ Drehung starten';
  };
  document.getElementById('btnReset').onclick=()=>window.buehne.reset();

  waehleBuehne('wuerfel');
})();
</script>

<script>
/* ============================================================
   KARTE F — Selbstkontrolle (Flip-Cards)
   ============================================================ */
(function(){

    {f:'Ist ein Zylinder ein Prisma?', b:'Nein. Er ist zwar eine Säule wie ein Prisma, aber seine Grundfläche ist ein Kreis und sein Mantel ist krumm. Er ist der runde Verwandte des Prismas.'},
    {f:'Ist ein Kegel eine Pyramide?', b:'Nein. Beide sind Spitzkörper, aber der Kegel hat eine kreisförmige Grundfläche und eine krumme Mantelfläche statt ebener Dreiecke. Er ist der runde Verwandte der Pyramide.'},
    {f:'Was ist ein Tetraeder?', b:'Eine Pyramide mit dreieckiger Grundfläche: vier Dreiecke, vier Ecken, sechs Kanten. Das Besondere: Alle sechs Kanten sind gleich lang, deshalb sind alle vier Dreiecke gleich groß und gleichseitig.'},
    {f:'Ist jede Pyramide mit dreieckiger Grundfläche ein Tetraeder?', b:'Nein. Beim Tetraeder sind alle sechs Kanten gleich lang, dadurch sind alle vier Dreiecke gleich groß und gleichseitig. Eine Pyramide mit dreieckiger Grundfläche darf auch eine hohe, schmale Spitze haben – dann sind ihre Dreiecke nicht mehr gleichseitig.'},
    {f:'Ist jede Pyramide eine quadratische Pyramide?', b:'Nein. Die Grundfläche kann auch ein Dreieck, Fünfeck oder Sechseck sein. Nur wenn sie ein Quadrat ist, heißt sie quadratische Pyramide.'},
    {f:'Kann ein Prisma auch eine Spitze haben?', b:'Nein. Ein Prisma hat oben eine zweite Grundfläche statt einer Spitze. Spitze bedeutet: Pyramide oder Kegel.'},
    {f:'Wie unterscheiden sich Kugel und Halbkugel?', b:'Die Kugel ist rundum gewölbt und hat keine einzige ebene Fläche. Die Halbkugel ist die halbe Kugel und hat unten zusätzlich eine ebene Kreisfläche.'},
    {f:'Welcher Begriff steht ganz unten im Haus?', b:'Der allgemeine Körper. Jeder besondere Körper ist auch ein Körper – aber nicht umgekehrt.'}
  ];
  let html='<h2>Prüfe dich selbst</h2>';

  html+='<div class="flip-grid">';
  cards.forEach((c,i)=>{
    html+='<div class="flip" id="flip_'+i+'" onclick="flipKarte(this,'+i+')">'
      +'<div class="flip-inner"><div class="flip-face flip-front">'+c.f+'</div>'
      +'<div class="flip-face flip-back">'+c.b+'</div></div></div>';
  });
  html+='</div><div class="flip-hint">Diese Karten dienen der Selbstkontrolle – es gibt hier keine Auswertung.</div>';
  window.flipKarte=function(el,i){el.classList.toggle('flipped');geflippt.add(i);};
  document.getElementById('karte_kf').innerHTML=html;
})();
</script>
