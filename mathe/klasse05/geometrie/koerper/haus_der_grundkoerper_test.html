<style>
:root{
  --grey:#6b7686;
  --grey-light:#eef0f3;
  --border-blue:#1f4680;
  --bg:#f7f8fa;
  --line:#e2e6ec;
  --karte:#ffffff;
  --text:#22303f;
  --blau:#2f5fa6;
  --blau-light:#e6eefb;
  --gruen:#1e7d32;
  --rot:#c1272d;
  --amber:#b8860b;
  --amber-light:#fdf3d9;
  --amber-dark:#96690a;
  --schatten:0 4px 16px rgba(31,70,128,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);
  color:var(--text);font-size:17px;line-height:1.5;padding:0 0 60px 0;min-height:100vh;
}
h1,h2,h3{font-family:'Fredoka',sans-serif;font-weight:600;}
.kopf{background:var(--grey-light);border-bottom:4px solid var(--border-blue);color:var(--text);padding:18px 20px 16px;}
.kopf h1{margin:0;font-size:1.5rem;color:var(--border-blue);}
.kopf p{margin:4px 0 0;font-size:.95rem;color:var(--grey);font-weight:600;}
.badge{display:inline-block;background:var(--border-blue);color:#fff;border-radius:20px;padding:2px 12px;font-size:.8rem;font-weight:700;margin-top:8px;}

.tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 14px;position:sticky;top:0;z-index:30;background:var(--bg);box-shadow:0 4px 10px -8px rgba(0,0,0,.3);}
.tab{flex:1 1 auto;min-width:44px;min-height:44px;border:2px solid var(--line);background:var(--karte);border-radius:14px;font-family:'Fredoka',sans-serif;font-weight:500;font-size:.92rem;color:var(--grey);cursor:pointer;padding:6px 10px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab.aktiv{background:var(--border-blue);color:#fff;border-color:var(--border-blue);box-shadow:var(--schatten);}
.tab .haken{font-weight:800;}

.wrap{max-width:960px;margin:0 auto;padding:6px 14px;}
.karte{background:var(--karte);border:2px solid var(--border-blue);border-radius:20px;padding:20px 18px;margin:14px 0;box-shadow:var(--schatten);display:none;animation:fade .25s ease;}
.karte.aktiv{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.karte h2{margin:0 0 4px;font-size:1.25rem;color:var(--border-blue);}
.karte .unter{color:var(--grey);font-weight:600;font-size:.92rem;margin-bottom:14px;}

.hinweiskasten{background:var(--grey-light);border:1px solid var(--line);border-radius:14px;padding:10px 14px;font-size:.9rem;font-weight:600;color:var(--grey);margin-bottom:14px;}

.aufg{border:1px solid var(--line);border-radius:16px;padding:14px;margin:14px 0;background:#fcfdfe;}
.aufg .nr{display:inline-block;background:var(--border-blue);color:#fff;font-family:'Fredoka';font-weight:600;border-radius:8px;padding:1px 9px;font-size:.85rem;margin-bottom:6px;}
.aufg .frage{font-weight:700;margin:4px 0 10px;}

/* Wahr/Falsch */
.wf-zeile{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line);}
.wf-zeile:first-of-type{border-top:none;}
.wf-text{flex:1 1 220px;font-weight:600;}
.wf-btns{display:flex;gap:8px;}
.wf-btns button{min-width:64px;min-height:44px;border:2px solid var(--line);background:var(--karte);border-radius:12px;font-family:'Fredoka';font-weight:500;font-size:.95rem;color:var(--text);cursor:pointer;}
.wf-btns button.gewaehlt{background:var(--blau);border-color:var(--blau);color:#fff;}

/* MC */
.mc{display:flex;flex-direction:column;gap:8px;}
.mc button{min-height:48px;text-align:left;padding:10px 14px;border:2px solid var(--line);background:var(--karte);border-radius:12px;font-family:'Nunito';font-weight:700;font-size:1rem;color:var(--text);cursor:pointer;}
.mc button.gewaehlt{background:var(--blau-light);border-color:var(--blau);}

/* Erkennen: Canvas */
.erkennen{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;}
.erkennen .buehne{flex:0 0 auto;}
.erkennen canvas{width:190px;height:190px;background:var(--blau-light);border:2px solid var(--line);border-radius:16px;touch-action:none;overscroll-behavior:contain;display:block;}
.erkennen .rechts{flex:1 1 240px;}
.drehhinweis{font-size:.8rem;color:var(--grey);font-weight:600;text-align:center;margin-top:6px;max-width:190px;}

/* Kategorien zuordnen (Antippen) */
.pool{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:48px;}
.chip{min-height:44px;padding:8px 14px;border:2px solid var(--line);background:var(--karte);border-radius:12px;font-family:'Fredoka';font-weight:500;font-size:.95rem;color:var(--text);cursor:pointer;}
.chip.markiert{background:var(--blau);border-color:var(--blau);color:#fff;}
.kats{display:flex;flex-wrap:wrap;gap:10px;}
.kat{flex:1 1 230px;border:2px dashed var(--line);border-radius:16px;padding:10px;min-height:130px;background:#fcfdfe;}
.kat.aktivziel{border-color:var(--blau);background:var(--blau-light);}
.kat h4{margin:0 0 8px;font-family:'Fredoka';font-weight:600;font-size:.98rem;color:var(--border-blue);}
.kat .inhalt{display:flex;flex-wrap:wrap;gap:6px;min-height:48px;}
.kat .ablegen{width:100%;min-height:44px;margin-top:8px;border:2px solid var(--line);background:var(--karte);color:var(--grey);border-radius:12px;font-family:'Fredoka';font-weight:600;font-size:.92rem;cursor:not-allowed;}
.kat .ablegen.bereit{border-color:var(--blau);background:var(--blau);color:#fff;cursor:pointer;}

/* Tabelle */
.tab-gitter{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:6px;align-items:center;}
.tab-gitter .kopfz{font-family:'Fredoka';font-weight:600;font-size:.88rem;color:var(--border-blue);text-align:center;}
.tab-gitter .zname{font-weight:700;font-size:.95rem;}
.tab-gitter input{width:100%;min-height:44px;border:2px solid var(--line);border-radius:10px;text-align:center;font-family:'Nunito';font-weight:700;font-size:1rem;color:var(--text);background:var(--karte);}
.tab-gitter input:focus{outline:none;border-color:var(--blau);}

/* Vierecke (Wiederholung) */
.vier-grid{display:flex;flex-wrap:wrap;gap:10px;}
.vier{flex:1 1 130px;border:2px solid var(--line);border-radius:14px;padding:8px;background:var(--karte);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:110px;justify-content:center;}
.vier.gewaehlt{background:var(--blau-light);border-color:var(--blau);}
.vier svg{width:64px;height:auto;}
.vier .name{font-family:'Fredoka';font-weight:600;font-size:.92rem;}

.pruef{min-height:44px;width:100%;margin-top:12px;background:var(--border-blue);color:#fff;border:none;border-radius:12px;font-family:'Fredoka';font-weight:600;font-size:1.02rem;cursor:pointer;padding:10px;}
.pruef:active{transform:scale(.99);}
.pruef.gespeichert{background:var(--gruen);}
.gespeichert-info{font-size:.85rem;color:var(--gruen);font-weight:700;margin-top:6px;display:none;}
.gespeichert-info.show{display:block;}

/* Auswertung */
.erg-kopf{text-align:center;padding:16px;border-radius:16px;background:var(--grey-light);border:2px solid var(--border-blue);margin-bottom:14px;}
.erg-kopf .punkte{font-family:'Fredoka';font-weight:700;font-size:2rem;color:var(--border-blue);}
.erg-kopf .text{font-weight:700;color:var(--grey);}
.erg{border-radius:14px;padding:12px 14px;margin:9px 0;font-weight:700;}
.erg.richtig{background:var(--gruen);color:#fff;}
.erg.falsch{background:var(--rot);color:#fff;}
.erg .zeile2{font-weight:600;font-size:.94rem;margin-top:4px;}
details.loesung{margin-top:10px;background:var(--amber-light);border:2px solid var(--amber);border-radius:12px;padding:0;}
details.loesung summary{cursor:pointer;list-style:none;padding:11px 14px;min-height:44px;display:flex;align-items:center;gap:8px;font-family:'Fredoka';font-weight:600;color:var(--amber-dark);}
details.loesung summary::-webkit-details-marker{display:none;}
details.loesung .inhalt{padding:0 14px 12px;color:var(--amber-dark);font-weight:600;font-size:.95rem;}
details.loesung .inhalt ol{margin:4px 0;padding-left:20px;}
details.loesung .inhalt li{margin:5px 0;}
.warnung{background:var(--amber-light);border:2px solid var(--amber);border-radius:14px;padding:12px 14px;color:var(--amber-dark);font-weight:700;margin-bottom:12px;}

.trex{position:fixed;right:12px;bottom:14px;font-size:1.7rem;cursor:pointer;z-index:60;filter:drop-shadow(0 2px 3px rgba(0,0,0,.2));user-select:none;}
.trex .made{position:absolute;right:0;bottom:120%;white-space:nowrap;background:#22303f;color:#fff;padding:5px 10px;border-radius:10px;font-size:.78rem;font-weight:700;font-family:'Fredoka';display:none;}
.trex.show .made{display:block;}

@media(max-width:520px){
  .tab-gitter{grid-template-columns:1.2fr 1fr 1fr 1fr;gap:4px;}
  .tab-gitter .kopfz{font-size:.76rem;}
  .tab-gitter .zname{font-size:.86rem;}
}
</style>

<header class="kopf">
  <h1>Wissenstest: Das Haus der Grundkörper</h1>

<script>
/* ============================================================
   MINI-3D-RENDERER (Canvas 2D, keine Bibliothek)
   ============================================================ */
const FARBE_FLAECHE='#e6eefb', FARBE_KANTE='#2f5fa6', FARBE_DUNKEL='#c3d3ee';
function rotY(p,a){const c=Math.cos(a),s=Math.sin(a);return [p[0]*c+p[2]*s, p[1], -p[0]*s+p[2]*c];}
function rotX(p,a){const c=Math.cos(a),s=Math.sin(a);return [p[0], p[1]*c-p[2]*s, p[1]*s+p[2]*c];}

function bauQuader(bx,by,bz){
  const v=[];
  for(const sx of [-1,1]) for(const sy of [-1,1]) for(const sz of [-1,1]) v.push([sx*bx,sy*by,sz*bz]);
  const i=(x,y,z)=>((x?4:0)+(y?2:0)+(z?1:0));
  const f=[
    [i(0,0,0),i(0,1,0),i(1,1,0),i(1,0,0)],
    [i(0,0,1),i(1,0,1),i(1,1,1),i(0,1,1)],
    [i(0,0,0),i(1,0,0),i(1,0,1),i(0,0,1)],
    [i(0,1,0),i(0,1,1),i(1,1,1),i(1,1,0)],
    [i(0,0,0),i(0,0,1),i(0,1,1),i(0,1,0)],
    [i(1,0,0),i(1,1,0),i(1,1,1),i(1,0,1)]
  ];
  return {v,f};
}
function bauPrisma(n,r,h,dreh){
  dreh=dreh||0;
  const v=[],unten=[],oben=[];
  for(let k=0;k<n;k++){const a=dreh+2*Math.PI*k/n;v.push([r*Math.cos(a),-h,r*Math.sin(a)]);unten.push(v.length-1);}
  for(let k=0;k<n;k++){const a=dreh+2*Math.PI*k/n;v.push([r*Math.cos(a), h,r*Math.sin(a)]);oben.push(v.length-1);}
  const f=[unten.slice().reverse(),oben.slice()];
  for(let k=0;k<n;k++){const k2=(k+1)%n;f.push([unten[k],unten[k2],oben[k2],oben[k]]);}
  return {v,f};
}
function bauPyramide(n,r,h,dreh){
  dreh=dreh||0;
  const v=[],basis=[];
  for(let k=0;k<n;k++){const a=dreh+2*Math.PI*k/n;v.push([r*Math.cos(a),-h*0.6,r*Math.sin(a)]);basis.push(v.length-1);}
  v.push([0,h,0]); const spitze=v.length-1;
  const f=[basis.slice().reverse()];
  for(let k=0;k<n;k++){const k2=(k+1)%n;f.push([basis[k],basis[k2],spitze]);}
  return {v,f};
}
function bauKugel(r,teil){
  const nu=16,nv=24, v=[],f=[];
  const phiMax=(teil<1)?Math.PI/2:Math.PI;
  const idx=[];
  for(let i=0;i<=nu;i++){
    const phi=phiMax*i/nu; const reihe=[];
    for(let j=0;j<nv;j++){
      const th=2*Math.PI*j/nv;
      v.push([r*Math.sin(phi)*Math.cos(th), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(th)]);
      reihe.push(v.length-1);
    }
    idx.push(reihe);
  }
  for(let i=0;i<nu;i++) for(let j=0;j<nv;j++){
    const j2=(j+1)%nv;
    f.push([idx[i][j],idx[i][j2],idx[i+1][j2],idx[i+1][j]]);
  }
  if(teil<1){ f.push(idx[nu].slice().reverse()); }
  return {v,f,glatt:true,halb:(teil<1)};
}

const KOERPER={
  wuerfel:   ()=>bauQuader(1,1,1),
  quader:    ()=>bauQuader(1.35,.75,.85),
  prisma:    ()=>bauPrisma(3,1.15,1.0,-Math.PI/2),
  prisma6:   ()=>bauPrisma(6,1.05,1.0,0),
  pyramideq: ()=>bauPyramide(4,1.15,1.2,Math.PI/4),
  tetraeder: ()=>bauPyramide(3,1.2,1.15,-Math.PI/2),
  pyramide:  ()=>bauPyramide(5,1.1,1.2,-Math.PI/2),
  zylinder:  ()=>bauPrisma(28,.95,1.0,0),
  kegel:     ()=>bauPyramide(28,1.05,1.25,0),
  halbkugel: ()=>bauKugel(1.15,0.5),
  kugel:     ()=>bauKugel(1.15,1)
};

function machRenderer(canvas, koerperKey, opt){
  opt=opt||{};
  const ctx=canvas.getContext('2d');
  const startX=(koerperKey==='halbkugel')?0.62:0.42;
  const st={rotY:0.6, rotX:startX, auto:true, key:koerperKey, ziehen:false, lx:0, ly:0};
  let geo=KOERPER[koerperKey]();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  function groesse(){
    const w=canvas.clientWidth||160, h=canvas.clientHeight||160;
    canvas.width=Math.round(w*dpr); canvas.height=Math.round(h*dpr);
  }
  groesse();
  window.addEventListener('resize',groesse);
  function mische(c1,c2,t){
    const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    const A=p(c1),B=p(c2);
    return 'rgb('+Math.round(A[0]+(B[0]-A[0])*t)+','+Math.round(A[1]+(B[1]-A[1])*t)+','+Math.round(A[2]+(B[2]-A[2])*t)+')';
  }
  function zeichne(){
    const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,skala=Math.min(W,H)*(opt.skala||0.28);
    ctx.clearRect(0,0,W,H);
    const P=geo.v.map(p=>{
      let q=rotY(p,st.rotY); q=rotX(q,st.rotX);
      const d=4.5,f=d/(d-q[2]*0.55);
      return {x:cx+q[0]*skala*f, y:cy-q[1]*skala*f, z:q[2]};
    });
    geo.f.map(fs=>({fs,zm:fs.reduce((s,i)=>s+P[i].z,0)/fs.length}))
      .sort((a,b)=>a.zm-b.zm)
      .forEach(({fs,zm})=>{
        const a=P[fs[0]],b=P[fs[1]],c=P[fs[2]];
        const vorne=((b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x))<0;
        if(geo.glatt && !vorne) return;
        const füll=mische(FARBE_DUNKEL,FARBE_FLAECHE,Math.max(0,Math.min(1,(zm+1.6)/3.2)));
        ctx.beginPath(); ctx.moveTo(P[fs[0]].x,P[fs[0]].y);
        for(let i=1;i<fs.length;i++) ctx.lineTo(P[fs[i]].x,P[fs[i]].y);
        ctx.closePath();
        ctx.fillStyle=füll; ctx.globalAlpha=vorne?1:0.55; ctx.fill();
        if(!geo.glatt){
          ctx.globalAlpha=vorne?1:0.35;
          ctx.lineWidth=Math.max(1.2,2.0*dpr); ctx.strokeStyle=FARBE_KANTE; ctx.lineJoin='round'; ctx.stroke();
        }else{
          ctx.globalAlpha=1; ctx.lineWidth=1; ctx.strokeStyle=füll; ctx.stroke();
        }
        ctx.globalAlpha=1;
      });
    if(geo.glatt){
      ctx.globalAlpha=1; ctx.lineWidth=Math.max(1.4,2.2*dpr); ctx.strokeStyle=FARBE_KANTE;
      if(!geo.halb){
        const r0=geo.v[geo.v.length-1];
        const rad=Math.sqrt(r0[0]*r0[0]+r0[1]*r0[1]+r0[2]*r0[2]);
        ctx.beginPath(); ctx.arc(cx,cy,rad*skala,0,2*Math.PI); ctx.stroke();
      }else{
        const n=24,start=geo.v.length-n;
        ctx.beginPath();
        for(let j=0;j<n;j++){const p=P[start+j]; if(j===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y);}
        ctx.closePath(); ctx.stroke();
      }
    }
  }
  let letzte=performance.now();
  function frame(t){
    const dt=Math.min(60,t-letzte); letzte=t;
    if(st.auto && !st.ziehen) st.rotY += 0.00050*dt;
    zeichne();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  canvas.addEventListener('pointerdown',e=>{
    st.ziehen=true; st.lx=e.clientX; st.ly=e.clientY;
    try{canvas.setPointerCapture(e.pointerId);}catch(_){}
  });
  canvas.addEventListener('pointermove',e=>{
    if(!st.ziehen) return;
    const dx=e.clientX-st.lx, dy=e.clientY-st.ly;
    st.lx=e.clientX; st.ly=e.clientY;
    st.rotY += dx*0.012;
    st.rotX = Math.max(-1.35, Math.min(1.35, st.rotX + dy*0.012));
    e.preventDefault();
  },{passive:false});
  const ende=e=>{ if(st.ziehen){ st.ziehen=false; try{canvas.releasePointerCapture(e.pointerId);}catch(_){} } };
  canvas.addEventListener('pointerup',ende);
  canvas.addEventListener('pointercancel',ende);
  canvas.addEventListener('touchmove',e=>{ if(st.ziehen) e.preventDefault(); },{passive:false});
  return {neuMessen:groesse};
}
</script>

<script>
/* ============================================================
   ZUSTAND — alles nur im JS-Speicher, kein localStorage
   ============================================================ */
const Z = {
  a1:{ antworten:{}, gespeichert:false },   // Wahr/Falsch
  a2:{ antworten:{}, gespeichert:false },   // Körper erkennen (MC)
  a3:{ zuordnung:{}, markiert:null, gespeichert:false }, // Kategorien
  a4:{ felder:{}, gespeichert:false },      // Tabelle
  a5:{ antworten:{}, gespeichert:false }    // Wiederholung Vierecke
};

const KARTEN=[
  {id:'k1', tab:'1 · Stimmt das?'},
  {id:'k2', tab:'2 · Körper erkennen'},
  {id:'k3', tab:'3 · Eben oder krumm?'},
  {id:'k4', tab:'4 · Zählen'},
  {id:'k5', tab:'🔁 Wiederholung'},
  {id:'k6', tab:'📊 Auswertung'}
];
let aktiv='k1';
const tabsEl=document.getElementById('tabs'), kartenEl=document.getElementById('karten');
KARTEN.forEach(k=>{
  const t=document.createElement('button');
  t.className='tab'+(k.id===aktiv?' aktiv':''); t.id='tab_'+k.id;
  t.innerHTML='<span>'+k.tab+'</span><span class="haken" id="haken_'+k.id+'"></span>';
  t.onclick=()=>zeige(k.id); tabsEl.appendChild(t);
  const c=document.createElement('section');
  c.className='karte'+(k.id===aktiv?' aktiv':''); c.id='karte_'+k.id;
  kartenEl.appendChild(c);
});
function zeige(id){
  aktiv=id;
  KARTEN.forEach(k=>{
    document.getElementById('karte_'+k.id).classList.toggle('aktiv',k.id===id);
    document.getElementById('tab_'+k.id).classList.toggle('aktiv',k.id===id);
  });
  if(id==='k6') baueAuswertung();
  if(id==='k2' && window.rendErk) window.rendErk.forEach(r=>r.neuMessen());
  window.scrollTo({top:0,behavior:'smooth'});

  }

  /* --- Aufgabe 4 (mehrschrittig → Musterlösung) --- */
  body+='<h3>Aufgabe 4: Flächen, Kanten und Ecken</h3>';
  let a4richtig=0, a4max=0;
  A4.forEach(r=>{
    ['f','k','e'].forEach(sp=>{
      max++; a4max++;
      const ant=Z.a4.gespeichert?(Z.a4.felder[r.id+'_'+sp]||''):'';
      if(parseInt(ant,10)===r[sp]){ p++; a4richtig++; }
    });
  });
  const a4ok=(a4richtig===a4max);
  body+='<div class="erg '+(a4ok?'richtig':'falsch')+'">'
    +(a4ok?'✓ ':'✗ ')+'Du hast '+a4richtig+' von '+a4max+' Zahlen richtig eingetragen.';
  if(!a4ok){
    body+='<div class="zeile2">Richtig wäre: ';
    body+=A4.map(r=>r.name+': '+r.f+' Flächen, '+r.k+' Kanten, '+r.e+' Ecken').join(' · ');
    body+='</div>';
  }
  body+='</div>';
  if(!a4ok){
    body+='<details class="loesung"><summary>💡 Musterlösung mit Lösungsweg anzeigen</summary><div class="inhalt">';
    A4.forEach(r=>{
      body+='<b>'+r.name+'</b><ol>';
      r.weg.forEach(s=>{ body+='<li>'+s+'</li>'; });
      body+='</ol>';
    });
    body+='<b>Tipp fürs nächste Mal:</b> Bei jeder Pyramide gilt: Zähle zuerst die Ecken der Grundfläche. '
      +'Von jeder dieser Ecken führt genau eine Kante zur Spitze. So bekommst du Kanten und Ecken sicher zusammen.'
      +'</div></details>';
  }

  /* --- Wiederholung --- */
  body+='<h3>Wiederholung: Haus der Vierecke</h3>';
  A5.forEach((a,i)=>{
    max++;
    const ant=Z.a5.gespeichert?Z.a5.antworten[a.id]:undefined;
    const ok = ant===a.loesung;
    if(ok) p++;
    body+='<div class="erg '+(ok?'richtig':'falsch')+'">'
      +(ok?'✓ ':'✗ ')+'Wiederholung '+(i+1)
      +'<div class="zeile2">'
      +(ant===undefined?'Nicht bearbeitet. ':'Deine Antwort: '+a.labels[ant]+'. ')
      +'Richtig ist: <b>'+a.labels[a.loesung]+'</b>. '+a.erkl
      +'</div></div>';
  });

  /* --- Kopf --- */
  const prozent=Math.round(100*p/max);
  let text;
  if(prozent>=90) text='Sehr stark! Du hast das Haus der Grundkörper verstanden.';
  else if(prozent>=70) text='Gut gemacht. Ein paar Stellen kannst du noch nachschärfen.';
  else if(prozent>=50) text='Das Grundgerüst steht. Schau dir die roten Kästen und die Musterlösungen genau an.';
  else text='Geh die Lernseite noch einmal durch. Die Erklärungen unten helfen dir dabei.';

  h+='<div class="erg-kopf"><div class="punkte">'+p+' von '+max+' Punkten</div>'
    +'<div class="text">'+prozent+' % · '+text+'</div></div>';
  h+=body;
  el.innerHTML=h;
}
</script>

</body>
</html>
